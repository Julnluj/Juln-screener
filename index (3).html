<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoScreener</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0f14;
  --bg2: #13161e;
  --bg3: #1a1e28;
  --border: #2a2f3d;
  --text: #e2e8f0;
  --muted: #64748b;
  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;
  --yellow: #f59e0b;
  --accent: #6366f1;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 12px; overflow: hidden; }
.app { display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 300px; min-width: 300px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.toolbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 8px 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.btn { background: var(--bg3); border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-family: inherit; transition: all 0.15s; }
.btn:hover { border-color: var(--accent); color: var(--text); }
.btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-exchange { font-size: 10px; padding: 3px 8px; }
.btn-exchange.bi { color: #f0b90b; border-color: #f0b90b44; }
.btn-exchange.bi.active { background: #f0b90b22; border-color: #f0b90b; color: #f0b90b; }
.btn-exchange.ok { color: #1a78ff; border-color: #1a78ff44; }
.btn-exchange.ok.active { background: #1a78ff22; border-color: #1a78ff; color: #1a78ff; }
.btn-exchange.by { color: #f7931a; border-color: #f7931a44; }
.btn-exchange.by.active { background: #f7931a22; border-color: #f7931a; color: #f7931a; }
.sidebar-header { padding: 10px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.sidebar-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
.filter-row { padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.filter-input { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 4px; font-family: inherit; font-size: 11px; width: 100%; }
.filter-input:focus { outline: none; border-color: var(--accent); }
.col-header { display: grid; grid-template-columns: 1fr 60px 60px 70px; padding: 6px 12px; border-bottom: 1px solid var(--border); color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
.col-header span { cursor: pointer; user-select: none; }
.col-header span:hover { color: var(--text); }
.coin-list { flex: 1; overflow-y: auto; }
.coin-list::-webkit-scrollbar { width: 4px; }
.coin-list::-webkit-scrollbar-track { background: transparent; }
.coin-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.coin-row { display: grid; grid-template-columns: 1fr 60px 60px 70px; padding: 6px 12px; border-bottom: 1px solid #1a1e2844; cursor: pointer; transition: background 0.1s; align-items: center; }
.coin-row:hover { background: var(--bg3); }
.coin-row.selected { background: #6366f122; border-left: 2px solid var(--accent); }
.coin-name { font-size: 12px; font-weight: 600; color: var(--text); }
.coin-exch { font-size: 9px; color: var(--muted); margin-top: 1px; }
.val { text-align: right; font-size: 11px; }
.up { color: var(--green); }
.dn { color: var(--red); }
.muted { color: var(--muted); }
.charts-area { flex: 1; overflow: hidden; padding: 8px; display: grid; gap: 8px; }
.chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; display: flex; flex-direction: column; overflow: hidden; }
.chart-header { padding: 6px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.chart-ticker { font-size: 12px; font-weight: 700; color: var(--text); }
.chart-price { font-size: 13px; font-weight: 700; }
.chart-canvas { flex: 1; position: relative; }
canvas { display: block; }
.loading { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: 11px; }
.status-bar { padding: 4px 12px; background: var(--bg2); border-top: 1px solid var(--border); font-size: 10px; color: var(--muted); display: flex; gap: 16px; align-items: center; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 4px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.natr-badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; background: #f59e0b22; color: var(--yellow); border: 1px solid #f59e0b44; }
.sort-indicator { font-size: 9px; }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Монеты</span>
      <span id="coin-count" style="font-size:10px;color:var(--muted)">—</span>
    </div>
    <div class="filter-row">
      <input class="filter-input" id="search" placeholder="Поиск тикера..." />
    </div>
    <div class="filter-row" style="gap:4px;">
      <span style="font-size:10px;color:var(--muted);width:100%;margin-bottom:4px">Мин. объём 24h:</span>
      <button class="btn active" id="vol-0" onclick="setVolFilter(0)">Все</button>
      <button class="btn" id="vol-10" onclick="setVolFilter(10)">10M+</button>
      <button class="btn" id="vol-50" onclick="setVolFilter(50)">50M+</button>
      <button class="btn" id="vol-100" onclick="setVolFilter(100)">100M+</button>
    </div>
    <div class="col-header">
      <span onclick="setSort('symbol')">Тикер <span class="sort-indicator" id="sort-symbol"></span></span>
      <span onclick="setSort('change')" style="text-align:right">ИЗМ <span class="sort-indicator" id="sort-change"></span></span>
      <span onclick="setSort('natr')" style="text-align:right">NATR <span class="sort-indicator" id="sort-natr"></span></span>
      <span onclick="setSort('volume')" style="text-align:right">ОБЪЁМ <span class="sort-indicator" id="sort-volume">▼</span></span>
    </div>
    <div class="coin-list" id="coin-list"></div>
  </div>

  <div class="main">
    <div class="toolbar">
      <span style="font-size:10px;color:var(--muted);margin-right:4px">БИРЖА:</span>
      <button class="btn btn-exchange bi active" onclick="toggleExchange('BI')">BI-F</button>
      <button class="btn btn-exchange ok" onclick="toggleExchange('OK')">OK-F</button>
      <button class="btn btn-exchange by" onclick="toggleExchange('BY')">BY-F</button>
      <span style="margin:0 6px;color:var(--border)">|</span>
      <span style="font-size:10px;color:var(--muted);margin-right:4px">ТФ:</span>
      <button class="btn active" id="tf-1m" onclick="setTf('1m')">1м</button>
      <button class="btn" id="tf-5m" onclick="setTf('5m')">5м</button>
      <button class="btn" id="tf-15m" onclick="setTf('15m')">15м</button>
      <button class="btn" id="tf-1h" onclick="setTf('1h')">1ч</button>
      <button class="btn" id="tf-4h" onclick="setTf('4h')">4ч</button>
      <button class="btn" id="tf-1d" onclick="setTf('1d')">1д</button>
      <button class="btn" id="tf-1w" onclick="setTf('1w')">1н</button>
      <span style="margin:0 6px;color:var(--border)">|</span>
      <span style="font-size:10px;color:var(--muted);margin-right:4px">СЕТКА:</span>
      <button class="btn" id="grid-1" onclick="setGrid(1)">1×1</button>
      <button class="btn" id="grid-2" onclick="setGrid(2)">2×3</button>
      <button class="btn active" id="grid-3" onclick="setGrid(3)">3×3</button>
    </div>
    <div class="charts-area" id="charts-area" style="grid-template-columns: repeat(3,1fr);"></div>
    <div class="status-bar">
      <span><span class="dot"></span>Binance Futures</span>
      <span id="status-text">Загрузка данных...</span>
      <span id="last-update" style="margin-left:auto">—</span>
    </div>
  </div>
</div>

<script>
const BINANCE_BASE = 'https://fapi.binance.com';
let allCoins = [], filteredCoins = [], selectedCoins = [];
let currentTf = '1m', currentGrid = 3, volFilter = 0;
let sortKey = 'volume', sortDir = -1, searchQ = '';
let activeExchanges = new Set(['BI']);

async function fetchBinanceTickers() {
  try {
    const r = await fetch(`${BINANCE_BASE}/fapi/v1/ticker/24hr`);
    const data = await r.json();
    return data.filter(d => d.symbol.endsWith('USDT')).map(d => {
      const price = parseFloat(d.lastPrice);
      const high = parseFloat(d.highPrice);
      const low = parseFloat(d.lowPrice);
      const natr = price > 0 ? ((high - low) / price * 100) : 0;
      const vol = parseFloat(d.quoteVolume) / 1e6;
      return {
        symbol: d.symbol.replace('USDT',''),
        price, change: parseFloat(d.priceChangePercent),
        volume: vol, natr: parseFloat(natr.toFixed(2)),
        exchange: 'BI-F', high, low
      };
    });
  } catch(e) { console.error(e); return []; }
}

async function loadTickers() {
  document.getElementById('status-text').textContent = 'Загрузка тикеров...';
  const coins = await fetchBinanceTickers();
  allCoins = coins;
  document.getElementById('last-update').textContent = new Date().toLocaleTimeString('ru');
  document.getElementById('status-text').textContent = `Загружено ${coins.length} монет`;
  applyFilters();
}

function setVolFilter(v) {
  volFilter = v;
  ['0','10','50','100'].forEach(x => document.getElementById('vol-'+x).classList.remove('active'));
  document.getElementById('vol-'+v).classList.add('active');
  applyFilters();
}

function setSort(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = key === 'symbol' ? 1 : -1; }
  ['symbol','change','natr','volume'].forEach(k => {
    const el = document.getElementById('sort-'+k);
    if (el) el.textContent = k === sortKey ? (sortDir > 0 ? '▲' : '▼') : '';
  });
  applyFilters();
}

function applyFilters() {
  let coins = [...allCoins];
  if (searchQ) coins = coins.filter(c => c.symbol.includes(searchQ.toUpperCase()));
  if (volFilter > 0) coins = coins.filter(c => c.volume >= volFilter);
  coins.sort((a,b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (typeof av === 'string') return sortDir * av.localeCompare(bv);
    return sortDir * (bv - av);
  });
  filteredCoins = coins;
  document.getElementById('coin-count').textContent = coins.length;
  renderList();
  if (selectedCoins.length === 0 && coins.length > 0) {
    const maxSlots = currentGrid === 1 ? 1 : currentGrid === 2 ? 6 : 9;
    selectedCoins = coins.slice(0, maxSlots).map(c => c.symbol);
  }
  renderCharts();
}

function renderList() {
  const el = document.getElementById('coin-list');
  el.innerHTML = filteredCoins.slice(0, 200).map(c => {
    const sel = selectedCoins.includes(c.symbol) ? 'selected' : '';
    const cls = c.change >= 0 ? 'up' : 'dn';
    const vol = c.volume >= 1000 ? (c.volume/1000).toFixed(1)+'B' : c.volume.toFixed(0)+'M';
    return `<div class="coin-row ${sel}" onclick="selectCoin('${c.symbol}')">
      <div><div class="coin-name">${c.symbol}</div><div class="coin-exch">${c.exchange}</div></div>
      <div class="val ${cls}">${c.change >= 0 ? '+' : ''}${c.change.toFixed(1)}%</div>
      <div class="val"><span class="natr-badge">${c.natr.toFixed(1)}</span></div>
      <div class="val muted">${vol}</div>
    </div>`;
  }).join('');
}

function selectCoin(symbol) {
  const idx = selectedCoins.indexOf(symbol);
  const maxSlots = currentGrid === 1 ? 1 : currentGrid === 2 ? 6 : 9;
  if (idx >= 0) selectedCoins.splice(idx, 1);
  else { if (selectedCoins.length >= maxSlots) selectedCoins.shift(); selectedCoins.push(symbol); }
  renderList();
  renderCharts();
}

function setTf(tf) {
  currentTf = tf;
  document.querySelectorAll('[id^="tf-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('tf-'+tf).classList.add('active');
  renderCharts();
}

function setGrid(n) {
  currentGrid = n;
  ['1','2','3'].forEach(x => document.getElementById('grid-'+x).classList.remove('active'));
  document.getElementById('grid-'+n).classList.add('active');
  const area = document.getElementById('charts-area');
  const cols = n === 1 ? 1 : n === 2 ? 2 : 3;
  area.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  const maxSlots = n === 1 ? 1 : n === 2 ? 6 : 9;
  selectedCoins = filteredCoins.slice(0, maxSlots).map(c => c.symbol);
  renderCharts();
}

async function fetchKlines(symbol, interval) {
  try {
    const r = await fetch(`${BINANCE_BASE}/fapi/v1/klines?symbol=${symbol}USDT&interval=${interval}&limit=80`);
    return await r.json();
  } catch(e) { return []; }
}

function drawCandles(canvas, klines) {
  if (!klines || klines.length < 2) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#13161e';
  ctx.fillRect(0,0,W,H);
  const data = klines.map(k => ({ o:+k[1], h:+k[2], l:+k[3], c:+k[4], v:+k[5] }));
  const maxH = Math.max(...data.map(d=>d.h)), minL = Math.min(...data.map(d=>d.l));
  const range = maxH - minL || 1;
  const pad = 8, volH = 20, chartH = H - pad*2 - volH - 4;
  const scaleY = v => pad + chartH - ((v - minL) / range * chartH);
  const n = data.length, cw = Math.max(1, Math.floor((W - pad*2) / n));
  const gap = cw > 3 ? 1 : 0, bw = cw - gap;
  const maxVol = Math.max(...data.map(d=>d.v));
  ctx.strokeStyle = '#2a2f3d'; ctx.lineWidth = 0.5;
  for (let i=0; i<=4; i++) {
    const y = pad + (chartH/4)*i;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    const val = maxH - (range/4)*i;
    ctx.fillStyle = '#64748b'; ctx.font = '9px monospace';
    ctx.fillText(val<0.01?val.toFixed(6):val<1?val.toFixed(4):val<100?val.toFixed(2):val.toFixed(0), 2, y-2);
  }
  data.forEach((d,i) => {
    const x = pad + i*cw, up = d.c >= d.o, color = up ? '#22c55e' : '#ef4444';
    ctx.strokeStyle = color; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x+bw/2, scaleY(d.h)); ctx.lineTo(x+bw/2, scaleY(d.l)); ctx.stroke();
    ctx.fillStyle = color;
    const bodyTop = Math.min(scaleY(d.o), scaleY(d.c)), bodyH = Math.max(1, Math.abs(scaleY(d.c)-scaleY(d.o)));
    ctx.fillRect(x, bodyTop, Math.max(1,bw), bodyH);
    ctx.fillStyle = up ? '#22c55e44' : '#ef444444';
    ctx.fillRect(x, H-(d.v/maxVol)*volH, Math.max(1,bw), (d.v/maxVol)*volH);
  });
}

async function renderCharts() {
  const area = document.getElementById('charts-area');
  const maxSlots = currentGrid === 1 ? 1 : currentGrid === 2 ? 6 : 9;
  let symbols = selectedCoins.slice(0, maxSlots);
  if (symbols.length === 0 && filteredCoins.length > 0) {
    selectedCoins = filteredCoins.slice(0, maxSlots).map(c=>c.symbol);
    symbols = [...selectedCoins];
  }
  area.innerHTML = symbols.map(sym => {
    const coin = allCoins.find(c=>c.symbol===sym);
    const price = coin?.price || 0, change = coin?.change || 0;
    const cls = change >= 0 ? 'up' : 'dn';
    const pFmt = price<0.01?price.toFixed(6):price<1?price.toFixed(4):price<100?price.toFixed(3):price.toFixed(2);
    return `<div class="chart-card">
      <div class="chart-header">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="chart-ticker">${sym}</span>
          <span style="font-size:9px;color:var(--muted)">BI-F · ${currentTf}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="chart-price ${cls}">$${pFmt}</span>
          <span style="font-size:11px" class="${cls}">${change>=0?'+':''}${change.toFixed(2)}%</span>
        </div>
      </div>
      <div class="chart-canvas" id="wrap-${sym}">
        <div class="loading" id="loading-${sym}">Загрузка...</div>
      </div>
    </div>`;
  }).join('');

  for (const sym of symbols) {
    const wrap = document.getElementById('wrap-'+sym);
    if (!wrap) continue;
    const klines = await fetchKlines(sym, currentTf);
    const loadEl = document.getElementById('loading-'+sym);
    if (loadEl) loadEl.remove();
    const canvas = document.createElement('canvas');
    canvas.width = wrap.clientWidth || 300;
    canvas.height = wrap.clientHeight || 160;
    canvas.style.width = '100%'; canvas.style.height = '100%';
    wrap.appendChild(canvas);
    drawCandles(canvas, klines);
  }
}

function toggleExchange(ex) {
  const btn = document.querySelector(`.btn-exchange.${ex.toLowerCase()}`);
  if (activeExchanges.has(ex)) {
    if (activeExchanges.size > 1) { activeExchanges.delete(ex); btn.classList.remove('active'); }
  } else { activeExchanges.add(ex); btn.classList.add('active'); }
}

document.getElementById('search').addEventListener('input', e => { searchQ = e.target.value; applyFilters(); });

setGrid(3);
loadTickers();
setInterval(loadTickers, 30000);
</script>
</body>
</html>
