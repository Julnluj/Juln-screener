<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoScreener</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0f14; --bg2: #13161e; --bg3: #1a1e28;
  --border: #2a2f3d; --text: #e2e8f0; --muted: #64748b;
  --green: #22c55e; --red: #ef4444; --yellow: #f59e0b; --accent: #6366f1;
}
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'JetBrains Mono','Courier New',monospace; font-size:12px; overflow:hidden; }
.app { display:flex; height:100vh; overflow:hidden; flex-direction:row-reverse; }
.sidebar { width:280px; min-width:280px; background:var(--bg2); border-left:1px solid var(--border); display:flex; flex-direction:column; }
.sidebar-header { padding:10px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.sidebar-title { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
.filter-row { padding:6px 10px; border-bottom:1px solid var(--border); display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
.filter-input { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:3px 7px; border-radius:4px; font-family:inherit; font-size:11px; width:100%; }
.filter-input:focus { outline:none; border-color:var(--accent); }
.range-inputs { display:flex; gap:4px; width:100%; }
.range-input { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:3px 6px; border-radius:4px; font-family:inherit; font-size:11px; width:50%; }
.range-input:focus { outline:none; border-color:var(--accent); }
.range-input::placeholder { color:var(--muted); }
.col-header { display:grid; grid-template-columns:1fr 55px 55px 65px; padding:5px 10px; border-bottom:1px solid var(--border); color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.05em; }
.col-header span { cursor:pointer; user-select:none; }
.col-header span:hover { color:var(--text); }
.coin-list { flex:1; overflow-y:auto; }
.coin-list::-webkit-scrollbar { width:3px; }
.coin-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.coin-row { display:grid; grid-template-columns:1fr 55px 55px 65px; padding:5px 10px; border-bottom:1px solid #1a1e2833; cursor:pointer; transition:background .1s; align-items:center; }
.coin-row:hover { background:var(--bg3); }
.coin-row.selected { background:#6366f118; border-left:2px solid var(--accent); }
.coin-name { font-size:12px; font-weight:600; }
.coin-exch { font-size:9px; color:var(--muted); margin-top:1px; }
.val { text-align:right; font-size:11px; }
.up { color:var(--green); } .dn { color:var(--red); } .muted { color:var(--muted); }
.natr-badge { font-size:9px; padding:1px 4px; border-radius:3px; background:#f59e0b18; color:var(--yellow); border:1px solid #f59e0b33; }
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.toolbar { background:var(--bg2); border-bottom:1px solid var(--border); padding:6px 10px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.tb-sep { width:1px; height:16px; background:var(--border); margin:0 2px; }
.tb-label { font-size:10px; color:var(--muted); white-space:nowrap; }
.btn { background:var(--bg3); border:1px solid var(--border); color:var(--muted); padding:3px 9px; border-radius:4px; cursor:pointer; font-size:11px; font-family:inherit; transition:all .15s; white-space:nowrap; }
.btn:hover { border-color:var(--accent); color:var(--text); }
.btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.btn-by { color:#f7931a; border-color:#f7931a33; }
.btn-by.active { background:#f7931a18; border-color:#f7931a; color:#f7931a; }
.btn-ok { color:#1a78ff; border-color:#1a78ff33; }
.btn-ok.active { background:#1a78ff18; border-color:#1a78ff; color:#1a78ff; }
.btn-bi { color:#f0b90b; border-color:#f0b90b33; }
.btn-bi.active { background:#f0b90b18; border-color:#f0b90b; color:#f0b90b; }
.tb-filter { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:3px 7px; border-radius:4px; font-family:inherit; font-size:11px; width:70px; }
.tb-filter:focus { outline:none; border-color:var(--accent); }
.tb-filter::placeholder { color:var(--muted); }
.charts-area { flex:1; overflow:hidden; padding:6px; display:grid; gap:6px; }
.chart-card { background:var(--bg2); border:1px solid var(--border); border-radius:6px; display:flex; flex-direction:column; overflow:hidden; cursor:pointer; transition:border-color .2s; }
.chart-card:hover { border-color:#6366f166; }
.chart-header { padding:5px 8px; border-bottom:1px solid var(--border); }
.chart-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
.chart-ticker { font-size:13px; font-weight:700; }
.chart-indicators { display:flex; gap:4px; flex-wrap:wrap; }
.ind { font-size:9px; padding:1px 5px; border-radius:3px; white-space:nowrap; }
.ind-green { background:#22c55e18; color:#22c55e; border:1px solid #22c55e33; }
.ind-red { background:#ef444418; color:#ef4444; border:1px solid #ef444433; }
.ind-yellow { background:#f59e0b18; color:#f59e0b; border:1px solid #f59e0b33; }
.ind-blue { background:#3b82f618; color:#3b82f6; border:1px solid #3b82f633; }
.ind-gray { background:#64748b18; color:#94a3b8; border:1px solid #64748b33; }
.ind-purple { background:#6366f118; color:#a5b4fc; border:1px solid #6366f133; }
.chart-body { flex:1; position:relative; min-height:0; }
.fs-toolbar { padding:6px 10px; border-bottom:1px solid var(--border); background:var(--bg2); display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.tool-btn { background:var(--bg3); border:1px solid var(--border); color:var(--muted); padding:3px 10px; border-radius:4px; cursor:pointer; font-size:11px; font-family:inherit; transition:all .15s; display:flex; align-items:center; gap:4px; }
.tool-btn:hover { border-color:var(--accent); color:var(--text); }
.tool-btn.active { background:#6366f122; border-color:var(--accent); color:var(--accent); }
.tool-btn.danger:hover { border-color:var(--red); color:var(--red); }
.fullscreen-overlay { display:none; position:fixed; inset:0; background:#0d0f1488; z-index:1000; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
.fullscreen-overlay.open { display:flex; }
.fs-popup { width:calc(100vw - 80px); height:calc(100vh - 80px); background:var(--bg2); border:1px solid var(--border); border-radius:10px; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 24px 80px #00000088; }
.fs-header { padding:8px 14px; border-bottom:1px solid var(--border); background:var(--bg2); display:flex; align-items:center; justify-content:space-between; border-radius:10px 10px 0 0; }
.fs-indicators { display:flex; gap:5px; flex-wrap:wrap; padding:6px 10px; border-bottom:1px solid var(--border); background:var(--bg2); }
.fs-body { flex:1; min-height:0; }
.close-btn { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:4px 12px; border-radius:4px; cursor:pointer; font-family:inherit; font-size:12px; }
.close-btn:hover { border-color:var(--red); color:var(--red); }
.status-bar { padding:3px 12px; background:var(--bg2); border-top:1px solid var(--border); font-size:10px; color:var(--muted); display:flex; gap:16px; align-items:center; }
.dot { width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; margin-right:4px; animation:pulse 2s infinite; }
.dot.red { background:var(--red); }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
.flash-up { animation: flashUp 0.5s ease; }
.flash-dn { animation: flashDn 0.5s ease; }
@keyframes flashUp { 0%{background:#22c55e33} 100%{background:transparent} }
@keyframes flashDn { 0%{background:#ef444433} 100%{background:transparent} }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Монеты</span>
      <span id="coin-count" style="font-size:10px;color:var(--muted)">—</span>
    </div>
    <div class="filter-row">
      <input class="filter-input" id="search" placeholder="Поиск тикера..." />
    </div>
    <div class="filter-row">
      <span style="font-size:10px;color:var(--muted);width:100%;margin-bottom:3px">Объём 24h (млн $):</span>
      <div class="range-inputs">
        <input class="range-input" id="vol-min" placeholder="от" type="number" min="0" oninput="applyFilters()"/>
        <input class="range-input" id="vol-max" placeholder="до" type="number" min="0" oninput="applyFilters()"/>
      </div>
    </div>
    <div class="filter-row">
      <span style="font-size:10px;color:var(--muted);width:100%;margin-bottom:3px">NATR (%):</span>
      <div class="range-inputs">
        <input class="range-input" id="natr-min" placeholder="от" type="number" step="0.1" oninput="applyFilters()"/>
        <input class="range-input" id="natr-max" placeholder="до" type="number" step="0.1" oninput="applyFilters()"/>
      </div>
    </div>
    <div class="filter-row">
      <span style="font-size:10px;color:var(--muted);width:100%;margin-bottom:3px">Изменение цены (%):</span>
      <div class="range-inputs">
        <input class="range-input" id="chg-min" placeholder="от" type="number" step="0.1" oninput="applyFilters()"/>
        <input class="range-input" id="chg-max" placeholder="до" type="number" step="0.1" oninput="applyFilters()"/>
      </div>
    </div>
    <div class="col-header">
      <span onclick="setSort('symbol')">Тикер <span id="sort-symbol"></span></span>
      <span onclick="setSort('change')" style="text-align:right">ИЗМ <span id="sort-change"></span></span>
      <span onclick="setSort('natr')" style="text-align:right">NATR <span id="sort-natr"></span></span>
      <span onclick="setSort('volume')" style="text-align:right">ОБЪ <span id="sort-volume">▼</span></span>
    </div>
    <div class="coin-list" id="coin-list"></div>
  </div>

  <div class="main">
    <div class="toolbar">
      <span class="tb-label">БИРЖА:</span>
      <button class="btn btn-by active" id="ex-BY" onclick="setExchange('BY')">BY-F</button>
      <button class="btn btn-ok" id="ex-OK" onclick="setExchange('OK')">OK-F</button>
      <button class="btn btn-bi" id="ex-BI" onclick="setExchange('BI')">BI-F</button>
      <div class="tb-sep"></div>
      <span class="tb-label">ТФ:</span>
      <button class="btn active" id="tf-1m" onclick="setTf('1m')">1м</button>
      <button class="btn" id="tf-5m" onclick="setTf('5m')">5м</button>
      <button class="btn" id="tf-15m" onclick="setTf('15m')">15м</button>
      <button class="btn" id="tf-1h" onclick="setTf('1h')">1ч</button>
      <button class="btn" id="tf-4h" onclick="setTf('4h')">4ч</button>
      <button class="btn" id="tf-1d" onclick="setTf('1d')">1д</button>
      <button class="btn" id="tf-1w" onclick="setTf('1w')">1н</button>
      <div class="tb-sep"></div>
      <span class="tb-label">СЕТКА:</span>
      <button class="btn" id="grid-1" onclick="setGrid(1,1)">1×1</button>
      <button class="btn" id="grid-2" onclick="setGrid(2,2)">2×2</button>
      <button class="btn active" id="grid-3" onclick="setGrid(3,3)">3×3</button>
      <div class="tb-sep"></div>
      <span class="tb-label">СОРТ:</span>
      <button class="btn" id="sort-btn-volume" onclick="setSort('volume')">ОБЪ ↓</button>
      <button class="btn" id="sort-btn-natr" onclick="setSort('natr')">NATR ↓</button>
      <button class="btn" id="sort-btn-change" onclick="setSort('change')">ИЗМ ↓</button>
    </div>
    <div class="charts-area" id="charts-area"></div>
    <div class="status-bar">
      <span><span class="dot" id="ws-dot"></span><span id="ws-status">Подключение...</span></span>
      <span id="status-text">—</span>
      <span id="last-update" style="margin-left:auto">—</span>
    </div>
  </div>
</div>

<div class="fullscreen-overlay" id="fs-overlay">
  <div class="fs-popup">
    <div class="fs-header">
    <div style="display:flex;align-items:center;gap:12px">
      <span id="fs-ticker" style="font-size:16px;font-weight:700"></span>
      <span id="fs-price" style="font-size:15px;font-weight:700"></span>
      <span id="fs-change" style="font-size:13px"></span>
      <span style="font-size:10px;color:var(--muted)" id="fs-meta"></span>
    </div>
    <button class="close-btn" onclick="closeFullscreen()">✕ Закрыть</button>
  </div>
  <div class="fs-indicators" id="fs-indicators"></div>
  <div class="fs-toolbar">
    <span class="tb-label">ТФ:</span>
    <button class="tool-btn" id="fs-tf-1m" onclick="setFsTf('1m')">1м</button>
    <button class="tool-btn" id="fs-tf-5m" onclick="setFsTf('5m')">5м</button>
    <button class="tool-btn" id="fs-tf-15m" onclick="setFsTf('15m')">15м</button>
    <button class="tool-btn" id="fs-tf-1h" onclick="setFsTf('1h')">1ч</button>
    <button class="tool-btn" id="fs-tf-4h" onclick="setFsTf('4h')">4ч</button>
    <button class="tool-btn" id="fs-tf-1d" onclick="setFsTf('1d')">1д</button>
    <button class="tool-btn" id="fs-tf-1w" onclick="setFsTf('1w')">1н</button>
    <div class="tb-sep"></div>
    <span class="tb-label">ИНСТР:</span>
    <button class="tool-btn" id="tool-none" onclick="setTool('none')">✦ Курсор</button>
    <button class="tool-btn" id="tool-hline" onclick="setTool('hline')">— Уровень</button>
    <button class="tool-btn" id="tool-ray" onclick="setTool('ray')">↗ Луч</button>
    <button class="tool-btn" id="tool-segment" onclick="setTool('segment')">╱ Сегмент</button>
    <button class="tool-btn" id="tool-channel" onclick="setTool('channel')">⫴ Канал</button>
    <div class="tb-sep"></div>
    <button class="tool-btn danger" onclick="clearDrawings()">🗑 Очистить</button>
  </div>
  <div class="fs-body" id="fs-body"></div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────
const EXCHANGES = {
  BY: {
    name: 'Bybit',
    restTickers: 'https://api.bybit.com/v5/market/tickers?category=linear',
    restKlines: (sym, tf, limit) => `https://api.bybit.com/v5/market/kline?category=linear&symbol=${sym}USDT&interval=${bybitTf(tf)}&limit=${limit}`,
    wsUrl: 'wss://stream.bybit.com/v5/public/linear',
    label: 'BY-F'
  },
  OK: {
    name: 'OKX',
    restTickers: 'https://www.okx.com/api/v5/market/tickers?instType=SWAP',
    restKlines: (sym, tf, limit) => `https://www.okx.com/api/v5/market/candles?instId=${sym}-USDT-SWAP&bar=${okxTf(tf)}&limit=${limit}`,
    wsUrl: 'wss://ws.okx.com:8443/ws/v5/public',
    label: 'OK-F'
  }
};

function bybitTf(tf) { return {'1m':'1','5m':'5','15m':'15','1h':'60','4h':'240','1d':'D','1w':'W'}[tf]||'1'; }
function okxTf(tf) { return {'1m':'1m','5m':'5m','15m':'15m','1h':'1H','4h':'4H','1d':'1D','1w':'1W'}[tf]||'1m'; }

// ── STATE ─────────────────────────────────────────────────────────────
let allCoins=[], filteredCoins=[], selectedCoins=[];
let currentTf='1m', gridCols=3, gridRows=3;
let sortKey='natr', sortDir=-1, searchQ='';
let currentExchange='BY';
let chartInstances={};
let fsChart=null, fsSymbol=null, fsTf='1m';
let activeTool='none';
let drawings={}; // symbol -> array of line objects
let ws=null, wsReconnectTimer=null;
let priceMap={}; // symbol -> latest price data

// ── HELPERS ───────────────────────────────────────────────────────────
function fmtPrice(p) {
  if (!p) return '0';
  return p<0.0001?p.toFixed(8):p<0.01?p.toFixed(6):p<1?p.toFixed(4):p<100?p.toFixed(3):p.toFixed(2);
}
function fmtVol(v) { return v>=1000?(v/1000).toFixed(1)+'B':v.toFixed(0)+'M'; }
function getNum(id) { const v=parseFloat(document.getElementById(id)?.value); return isNaN(v)?null:v; }

// ── REST: TICKERS ─────────────────────────────────────────────────────
async function fetchBybitTickers() {
  const r = await fetch(EXCHANGES.BY.restTickers);
  const j = await r.json();
  return (j.result?.list||[])
    .filter(d=>d.symbol.endsWith('USDT') && d.lastPrice>0)
    .map(d=>{
      const price=+d.lastPrice, high=+d.highPrice24h, low=+d.lowPrice24h;
      const natr = price>0?(high-low)/price*100:0;
      return {
        symbol: d.symbol.replace('USDT',''),
        price, change:+d.price24hPcnt*100,
        volume:+d.turnover24h/1e6,
        natr:+natr.toFixed(2),
        trades:+d.count||0,
        high, low, exchange:'BY-F'
      };
    });
}

async function fetchOkxTickers() {
  const r = await fetch(EXCHANGES.OK.restTickers);
  const j = await r.json();
  return (j.data||[])
    .filter(d=>d.instId.endsWith('-USDT-SWAP'))
    .map(d=>{
      const price=+d.last, open24h=+d.open24h, high=+d.high24h, low=+d.low24h;
      const natr = price>0?(high-low)/price*100:0;
      // change = (last - open24h) / open24h * 100
      const change = open24h>0 ? (price-open24h)/open24h*100 : 0;
      return {
        symbol: d.instId.replace('-USDT-SWAP',''),
        price, change:+change.toFixed(2),
        volume:+d.volCcy24h>0?+d.volCcy24h:+d.vol24h*price/1e6,
        natr:+natr.toFixed(2),
        trades:0,
        high, low, exchange:'OK-F'
      };
    });
}

async function loadTickers() {
  document.getElementById('status-text').textContent='Загрузка тикеров...';
  try {
    let coins;
    if (currentExchange==='BY') coins = await fetchBybitTickers();
    else if (currentExchange==='OK') coins = await fetchOkxTickers();
    else { document.getElementById('status-text').textContent='Binance заблокирован в ЕС. Выберите BY-F или OK-F.'; return; }

    allCoins = coins;
    // sync priceMap
    coins.forEach(c=>{ priceMap[c.symbol]={price:c.price, change:c.change}; });
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString('ru');
    document.getElementById('status-text').textContent = `${coins.length} монет · ${EXCHANGES[currentExchange]?.name}`;
    applyFilters();
    connectWebSocket();
  } catch(e) {
    console.error(e);
    document.getElementById('status-text').textContent='Ошибка: '+e.message;
  }
}

// ── REST: KLINES ──────────────────────────────────────────────────────
async function fetchBybitKlines(symbol, tf, limit=120) {
  const url = EXCHANGES.BY.restKlines(symbol, tf, limit);
  const r = await fetch(url);
  const j = await r.json();
  return (j.result?.list||[]).reverse().map(k=>({
    time:+k[0]/1000, open:+k[1], high:+k[2], low:+k[3], close:+k[4], volume:+k[5]
  }));
}

async function fetchOkxKlines(symbol, tf, limit=120) {
  const url = EXCHANGES.OK.restKlines(symbol, tf, limit);
  const r = await fetch(url);
  const j = await r.json();
  return (j.data||[]).reverse().map(k=>({
    time:+k[0]/1000, open:+k[1], high:+k[2], low:+k[3], close:+k[4], volume:+k[5]
  }));
}

async function fetchKlines(symbol, tf, limit=120) {
  if (currentExchange==='BY') return fetchBybitKlines(symbol, tf, limit);
  if (currentExchange==='OK') return fetchOkxKlines(symbol, tf, limit);
  return [];
}

// ── WEBSOCKET ─────────────────────────────────────────────────────────
function connectWebSocket() {
  if (ws) { try{ ws.close(); }catch(e){} ws=null; }
  if (wsReconnectTimer) clearTimeout(wsReconnectTimer);

  const exc = EXCHANGES[currentExchange];
  if (!exc) return;

  setWsStatus('connecting');
  ws = new WebSocket(exc.wsUrl);

  ws.onopen = () => {
    setWsStatus('connected');
    subscribeWs();
  };

  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (currentExchange==='BY') handleBybitMsg(data);
      else if (currentExchange==='OK') handleOkxMsg(data);
    } catch(err){}
  };

  ws.onerror = () => setWsStatus('error');
  ws.onclose = () => {
    setWsStatus('disconnected');
    wsReconnectTimer = setTimeout(connectWebSocket, 3000);
  };
}

function subscribeWs() {
  if (!ws || ws.readyState!==1) return;
  const syms = allCoins.slice(0,200).map(c=>c.symbol);

  if (currentExchange==='BY') {
    // Bybit: subscribe in batches of 10
    for (let i=0; i<syms.length; i+=10) {
      const batch = syms.slice(i,i+10).map(s=>`tickers.${s}USDT`);
      ws.send(JSON.stringify({ op:'subscribe', args: batch }));
    }
  } else if (currentExchange==='OK') {
    const args = syms.slice(0,100).map(s=>({ channel:'tickers', instId:`${s}-USDT-SWAP` }));
    ws.send(JSON.stringify({ op:'subscribe', args }));
  }
}

function handleBybitMsg(data) {
  if (data.topic && data.topic.startsWith('tickers.') && data.data) {
    const d = data.data;
    const sym = d.symbol?.replace('USDT','');
    if (!sym) return;
    const price = +d.lastPrice;
    const change = +d.price24hPcnt*100;
    if (!price) return;

    const prev = priceMap[sym];
    priceMap[sym] = { price, change };

    // update coin in allCoins
    const coin = allCoins.find(c=>c.symbol===sym);
    if (coin) {
      coin.price = price;
      coin.change = change;
      if (d.highPrice24h) coin.high = +d.highPrice24h;
      if (d.lowPrice24h) coin.low = +d.lowPrice24h;
      if (d.turnover24h) coin.volume = +d.turnover24h/1e6;
      if (coin.price>0) coin.natr = +((coin.high-coin.low)/coin.price*100).toFixed(2);
    }

    // flash price in grid
    updateChartPrice(sym, price, change, prev?.price);
  }
}

function handleOkxMsg(data) {
  if (data.arg?.channel==='tickers' && data.data?.[0]) {
    const d = data.data[0];
    const sym = d.instId?.replace('-USDT-SWAP','');
    if (!sym) return;
    const price = +d.last;
    const change = +d.sodUtc8*100;
    if (!price) return;
    const prev = priceMap[sym];
    priceMap[sym] = { price, change };
    const coin = allCoins.find(c=>c.symbol===sym);
    if (coin) { coin.price=price; coin.change=change; }
    updateChartPrice(sym, price, change, prev?.price);
  }
}

function setWsStatus(state) {
  const dot = document.getElementById('ws-dot');
  const txt = document.getElementById('ws-status');
  if (state==='connected') { dot.className='dot'; txt.textContent='Live'; }
  else if (state==='connecting') { dot.className='dot'; dot.style.background='var(--yellow)'; txt.textContent='Подключение...'; }
  else { dot.className='dot red'; txt.textContent='Переподключение...'; }
}

// ── FILTERS ───────────────────────────────────────────────────────────
function applyFilters() {
  let coins = [...allCoins];
  // минимальный объём 500к$ (0.5M)
  coins = coins.filter(c=>c.volume >= 0.5);
  if (searchQ) coins=coins.filter(c=>c.symbol.includes(searchQ.toUpperCase()));
  const volMin=getNum('vol-min'), volMax=getNum('vol-max');
  const natrMin=getNum('natr-min'), natrMax=getNum('natr-max');
  const chgMin=getNum('chg-min'), chgMax=getNum('chg-max');
  if (volMin!=null) coins=coins.filter(c=>c.volume>=volMin);
  if (volMax!=null) coins=coins.filter(c=>c.volume<=volMax);
  if (natrMin!=null) coins=coins.filter(c=>c.natr>=natrMin);
  if (natrMax!=null) coins=coins.filter(c=>c.natr<=natrMax);
  if (chgMin!=null) coins=coins.filter(c=>c.change>=chgMin);
  if (chgMax!=null) coins=coins.filter(c=>c.change<=chgMax);
  coins.sort((a,b)=>{ const av=a[sortKey],bv=b[sortKey]; return typeof av==='string'?sortDir*av.localeCompare(bv):sortDir*(bv-av); });
  filteredCoins=coins;
  document.getElementById('coin-count').textContent=coins.length;
  renderList();
  // графики всегда показывают топ монет по текущей сортировке
  const maxSlots=gridCols*gridRows;
  selectedCoins=coins.slice(0,maxSlots).map(c=>c.symbol);
  renderCharts();
}

function setSort(key) {
  if (sortKey===key) sortDir*=-1; else { sortKey=key; sortDir=-1; }
  ['symbol','change','natr','volume'].forEach(k=>{ const el=document.getElementById('sort-'+k); if(el) el.textContent=k===sortKey?(sortDir>0?'▲':'▼'):''; });
  ['volume','natr','change'].forEach(k=>{
    const btn=document.getElementById('sort-btn-'+k);
    if (!btn) return;
    const labels={'volume':'ОБЪ','natr':'NATR','change':'ИЗМ'};
    btn.textContent = labels[k]+(k===sortKey?(sortDir>0?' ↑':' ↓'):'  ↓');
    btn.classList.toggle('active', k===sortKey);
  });
  // пересортировать и перерисовать графики
  filteredCoins.sort((a,b)=>{ const av=a[sortKey],bv=b[sortKey]; return typeof av==='string'?sortDir*av.localeCompare(bv):sortDir*(bv-av); });
  const maxSlots=gridCols*gridRows;
  selectedCoins=filteredCoins.slice(0,maxSlots).map(c=>c.symbol);
  renderList();
  renderCharts();
}

// ── LIST ──────────────────────────────────────────────────────────────
let isDragging=false, dragAction=null; // dragAction: 'add' | 'remove'

function renderList() {
  document.getElementById('coin-list').innerHTML=filteredCoins.slice(0,300).map(c=>{
    const sel=selectedCoins.includes(c.symbol)?'selected':'';
    const cls=c.change>=0?'up':'dn';
    return `<div class="coin-row ${sel}" id="row-${c.symbol}"
      onmousedown="startDrag(event,'${c.symbol}')"
      onmouseenter="onDragEnter('${c.symbol}')"
      onclick="selectCoin('${c.symbol}')">
      <div><div class="coin-name">${c.symbol}</div><div class="coin-exch">${c.exchange}</div></div>
      <div class="val ${cls}" id="row-chg-${c.symbol}">${c.change>=0?'+':''}${c.change.toFixed(1)}%</div>
      <div class="val"><span class="natr-badge">${c.natr.toFixed(1)}</span></div>
      <div class="val muted">${fmtVol(c.volume)}</div>
    </div>`;
  }).join('');
}

function startDrag(e, symbol) {
  if (e.button!==0) return;
  isDragging=true;
  dragAction=selectedCoins.includes(symbol)?'remove':'add';
  // don't toggle here — click handles single tap
  document.addEventListener('mouseup', stopDrag, {once:true});
  e.preventDefault(); // prevent text selection
}

function onDragEnter(symbol) {
  if (!isDragging) return;
  const maxSlots=gridCols*gridRows;
  if (dragAction==='add' && !selectedCoins.includes(symbol)) {
    if (selectedCoins.length>=maxSlots) selectedCoins.shift();
    selectedCoins.push(symbol);
    const row=document.getElementById('row-'+symbol);
    if (row) row.classList.add('selected');
    renderCharts();
  } else if (dragAction==='remove' && selectedCoins.includes(symbol)) {
    selectedCoins=selectedCoins.filter(s=>s!==symbol);
    const row=document.getElementById('row-'+symbol);
    if (row) row.classList.remove('selected');
    renderCharts();
  }
}

function stopDrag() {
  isDragging=false;
  dragAction=null;
}

function selectCoin(symbol) {
  const idx=selectedCoins.indexOf(symbol);
  const maxSlots=gridCols*gridRows;
  if (idx>=0) selectedCoins.splice(idx,1);
  else { if(selectedCoins.length>=maxSlots) selectedCoins.shift(); selectedCoins.push(symbol); }
  renderList();
  renderCharts();
}

// ── INDICATORS ────────────────────────────────────────────────────────
function buildIndicators(coin, full=false) {
  if (!coin) return '';
  const cls=coin.change>=0?'ind-green':'ind-red';
  const range=coin.price>0?((coin.high-coin.low)/coin.price*100).toFixed(2):0;
  const trades=coin.trades>=1000?(coin.trades/1000).toFixed(0)+'K':coin.trades||'—';
  let html=`<span class="ind ${cls}">${coin.change>=0?'+':''}${coin.change.toFixed(2)}%</span>
    <span class="ind ind-yellow">Ренж ${range}%</span>
    <span class="ind ind-yellow">NATR ${coin.natr.toFixed(2)}%</span>
    <span class="ind ind-blue">Сделок ${trades}</span>
    <span class="ind ind-gray">Объём ${fmtVol(coin.volume)}</span>`;
  if (full) html+=`<span class="ind ind-purple">H ${fmtPrice(coin.high)}</span><span class="ind ind-purple">L ${fmtPrice(coin.low)}</span>`;
  return html;
}

// ── CHART SETUP ───────────────────────────────────────────────────────
function makeChartOpts(w,h) {
  return { width:w, height:h,
    layout:{ background:{color:'#13161e'}, textColor:'#64748b' },
    grid:{ vertLines:{color:'#1a1e28'}, horzLines:{color:'#1a1e28'} },
    crosshair:{ mode:LightweightCharts.CrosshairMode.Normal },
    rightPriceScale:{ borderColor:'#2a2f3d', scaleMargins:{top:0.05,bottom:0.2} },
    timeScale:{ borderColor:'#2a2f3d', timeVisible:true, secondsVisible:false },
    handleScroll:true, handleScale:true };
}

function setupChart(container, w, h) {
  const chart = LightweightCharts.createChart(container, makeChartOpts(w,h));
  const candles = chart.addCandlestickSeries({ upColor:'#22c55e', downColor:'#ef4444', borderUpColor:'#22c55e', borderDownColor:'#ef4444', wickUpColor:'#22c55e', wickDownColor:'#ef4444' });
  const volume = chart.addHistogramSeries({ priceFormat:{type:'volume'}, priceScaleId:'vol' });
  chart.priceScale('vol').applyOptions({ scaleMargins:{top:0.85,bottom:0} });
  return { chart, candles, volume };
}

function setKlines(inst, klines) {
  if (!klines.length) return;
  inst.candles.setData(klines);
  inst.volume.setData(klines.map(k=>({ time:k.time, value:k.volume, color:k.close>=k.open?'#22c55e33':'#ef444433' })));
  inst.chart.timeScale().fitContent();
}

// ── REALTIME PRICE UPDATE ─────────────────────────────────────────────
function updateChartPrice(sym, price, change, prevPrice) {
  // update row in list
  const chgEl = document.getElementById('row-chg-'+sym);
  if (chgEl) {
    chgEl.textContent = (change>=0?'+':'')+change.toFixed(1)+'%';
    chgEl.className = 'val '+(change>=0?'up':'dn');
  }
  // flash row
  const row = document.getElementById('row-'+sym);
  if (row && prevPrice) {
    row.classList.remove('flash-up','flash-dn');
    void row.offsetWidth;
    row.classList.add(price>=prevPrice?'flash-up':'flash-dn');
  }
  // update chart header
  const priceEl = document.getElementById('cprice-'+sym);
  const chgEl2 = document.getElementById('cchg-'+sym);
  if (priceEl) { priceEl.textContent='$'+fmtPrice(price); priceEl.className='chart-price '+(change>=0?'up':'dn'); }
  if (chgEl2) { chgEl2.textContent=(change>=0?'+':'')+change.toFixed(2)+'%'; chgEl2.className=(change>=0?'up':'dn')+' chart-chg'; }
  // update fs if open
  if (fsSymbol===sym) {
    const fp=document.getElementById('fs-price'), fc=document.getElementById('fs-change');
    if(fp){ fp.textContent='$'+fmtPrice(price); fp.className='chart-price '+(change>=0?'up':'dn'); }
    if(fc){ fc.textContent=(change>=0?'+':'')+change.toFixed(2)+'%'; fc.className=(change>=0?'up':'dn'); }
  }
}

// ── CHARTS GRID ───────────────────────────────────────────────────────
async function renderCharts() {
  const area=document.getElementById('charts-area');
  Object.values(chartInstances).forEach(i=>{ try{i.chart.remove();}catch(e){} });
  chartInstances={};
  area.style.gridTemplateColumns=`repeat(${gridCols},1fr)`;
  area.style.gridTemplateRows=`repeat(${gridRows},1fr)`;
  const maxSlots=gridCols*gridRows;
  let symbols=selectedCoins.slice(0,maxSlots);
  if (!symbols.length && filteredCoins.length) { selectedCoins=filteredCoins.slice(0,maxSlots).map(c=>c.symbol); symbols=[...selectedCoins]; }

  area.innerHTML=symbols.map(sym=>{
    const coin=allCoins.find(c=>c.symbol===sym)||{};
    const cls=(coin.change||0)>=0?'up':'dn';
    return `<div class="chart-card" id="card-${sym}">
      <div class="chart-header">
        <div class="chart-top">
          <span class="chart-ticker">${sym} <span style="font-size:9px;color:var(--muted);font-weight:400">${coin.exchange||''} · ${currentTf}</span></span>
          <div style="display:flex;align-items:center;gap:6px">
            <span class="chart-price ${cls}" id="cprice-${sym}">$${fmtPrice(coin.price||0)}</span>
            <span class="${cls} chart-chg" id="cchg-${sym}" style="font-size:11px">${(coin.change||0)>=0?'+':''}${(coin.change||0).toFixed(2)}%</span>
          </div>
        </div>
        <div class="chart-indicators" id="inds-${sym}">${buildIndicators(coin)}</div>
      </div>
      <div class="chart-body" id="body-${sym}"></div>
    </div>`;
  }).join('');

  for (const sym of symbols) {
    const bodyEl=document.getElementById('body-'+sym);
    const cardEl=document.getElementById('card-'+sym);
    if (!bodyEl) continue;
    const inst = setupChart(bodyEl, bodyEl.clientWidth||300, bodyEl.clientHeight||120);
    chartInstances[sym]=inst;
    cardEl.addEventListener('dblclick', ()=>openFullscreen(sym));
    fetchKlines(sym, currentTf).then(klines=>setKlines(inst, klines));
  }
}

// ── FULLSCREEN ────────────────────────────────────────────────────────
async function openFullscreen(symbol) {
  fsSymbol=symbol;
  fsTf=currentTf;
  const coin=allCoins.find(c=>c.symbol===symbol)||{};
  document.getElementById('fs-overlay').classList.add('open');
  document.getElementById('fs-ticker').textContent=symbol;
  document.getElementById('fs-meta').textContent=`${coin.exchange||''} · ${fsTf}`;
  const cls=(coin.change||0)>=0?'up':'dn';
  document.getElementById('fs-price').className='chart-price '+cls;
  document.getElementById('fs-price').textContent='$'+fmtPrice(coin.price||0);
  document.getElementById('fs-change').className=cls;
  document.getElementById('fs-change').textContent=((coin.change||0)>=0?'+':'')+(coin.change||0).toFixed(2)+'%';
  document.getElementById('fs-indicators').innerHTML=buildIndicators(coin,true);
  // sync tf buttons
  document.querySelectorAll('[id^="fs-tf-"]').forEach(b=>b.classList.remove('active'));
  const tfBtn=document.getElementById('fs-tf-'+fsTf);
  if(tfBtn) tfBtn.classList.add('active');
  // reset tool
  setTool('none');
  const fsBody=document.getElementById('fs-body');
  fsBody.innerHTML='';
  if (fsChart) { try{fsChart.chart.remove();}catch(e){} fsChart=null; }
  fsChart=setupChart(fsBody, fsBody.clientWidth||(window.innerWidth-80), fsBody.clientHeight||(window.innerHeight-200));
  const klines=await fetchKlines(symbol, fsTf, 300);
  setKlines(fsChart, klines);
}

function closeFullscreen() {
  document.getElementById('fs-overlay').classList.remove('open');
  if (fsChart) { try{fsChart.chart.remove();}catch(e){} fsChart=null; fsSymbol=null; }
}
document.getElementById('fs-overlay').addEventListener('click', e=>{ if(e.target===document.getElementById('fs-overlay')) closeFullscreen(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeFullscreen(); });

// ── FS TIMEFRAME ──────────────────────────────────────────────────────
function setFsTf(tf) {
  fsTf=tf;
  document.querySelectorAll('[id^="fs-tf-"]').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('fs-tf-'+tf);
  if(btn) btn.classList.add('active');
  if (fsSymbol) reloadFsChart();
}

async function reloadFsChart() {
  if (!fsChart || !fsSymbol) return;
  const klines=await fetchKlines(fsSymbol, fsTf, 300);
  setKlines(fsChart, klines);
  document.getElementById('fs-meta').textContent=`${(allCoins.find(c=>c.symbol===fsSymbol)||{}).exchange||''} · ${fsTf}`;
}

// ── DRAWING TOOLS ─────────────────────────────────────────────────────
let drawingStart=null;
let activeLine=null;

function setTool(tool) {
  activeTool=tool;
  document.querySelectorAll('[id^="tool-"]').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('tool-'+tool);
  if(btn) btn.classList.add('active');
  const fsBody=document.getElementById('fs-body');
  fsBody.style.cursor = tool==='none'?'default':'crosshair';
}

function clearDrawings() {
  if (!fsSymbol || !fsChart) return;
  if (drawings[fsSymbol]) {
    drawings[fsSymbol].forEach(d=>{ try{ fsChart.chart.removeSeries(d); }catch(e){} });
    drawings[fsSymbol]=[];
  }
}

// ── CONTROLS ──────────────────────────────────────────────────────────
function setExchange(ex) {
  currentExchange=ex;
  if (ws) { try{ws.close();}catch(e){} ws=null; }
  ['BY','OK','BI'].forEach(x=>document.getElementById('ex-'+x).classList.remove('active'));
  document.getElementById('ex-'+ex).classList.add('active');
  selectedCoins=[];
  allCoins=[];
  loadTickers();
}

function setTf(tf) {
  currentTf=tf;
  document.querySelectorAll('[id^="tf-"]').forEach(b=>b.classList.remove('active'));
  document.getElementById('tf-'+tf).classList.add('active');
  renderCharts();
  if (fsSymbol && document.getElementById('fs-overlay').classList.contains('open')) openFullscreen(fsSymbol);
}

function setGrid(cols,rows) {
  gridCols=cols; gridRows=rows;
  ['1','2','3'].forEach(x=>document.getElementById('grid-'+x).classList.remove('active'));
  document.getElementById('grid-'+cols).classList.add('active');
  selectedCoins=filteredCoins.slice(0,cols*rows).map(c=>c.symbol);
  renderCharts();
}

// ── RESIZE ────────────────────────────────────────────────────────────
let resizeTimer;
window.addEventListener('resize', ()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{
    Object.entries(chartInstances).forEach(([sym,inst])=>{ const b=document.getElementById('body-'+sym); if(b) inst.chart.applyOptions({width:b.clientWidth,height:b.clientHeight}); });
    if (fsChart) { const b=document.getElementById('fs-body'); if(b) fsChart.chart.applyOptions({width:b.clientWidth,height:b.clientHeight}); }
  },100);
});

document.getElementById('search').addEventListener('input', e=>{ searchQ=e.target.value; applyFilters(); });

// ── INIT ──────────────────────────────────────────────────────────────
setGrid(3,3);
// дефолтная сортировка по NATR
document.getElementById('sort-btn-natr').classList.add('active');
document.getElementById('sort-btn-natr').textContent='NATR ↓';
loadTickers();
setInterval(()=>{ loadTickers(); }, 60000);
</script>
