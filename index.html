<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoScreener</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #181818; --bg2: #202020; --bg3: #2a2a2a;
  --border: #333333; --text: #e8e8e8; --muted: #888888;
  --teal: #2dd4bf; --teal2: #14b8a6; --teal3: #0d9488;
  --orange: #fb923c; --orange2: #f97316; --orange3: #ea580c;
  --up: #2dd4bf; --dn: #fb923c;
  --accent: #2dd4bf;
}
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'IBM Plex Sans',sans-serif; font-size:12px; overflow:hidden; }
.app { display:flex; height:100vh; overflow:hidden; flex-direction:row-reverse; }
.sidebar { width:280px; min-width:280px; background:var(--bg2); border-left:1px solid var(--border); display:flex; flex-direction:column; }
.sidebar-header { padding:10px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.sidebar-title { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
.filter-row { padding:6px 10px; border-bottom:1px solid var(--border); display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
.filter-input { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:3px 7px; border-radius:4px; font-family:'IBM Plex Sans',sans-serif; font-size:11px; width:100%; }
.filter-input:focus { outline:none; border-color:var(--teal); }
.range-inputs { display:flex; gap:4px; width:100%; }
.range-input { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:3px 6px; border-radius:4px; font-family:'IBM Plex Sans',sans-serif; font-size:11px; width:50%; }
.range-input:focus { outline:none; border-color:var(--teal); }
.range-input::placeholder { color:var(--muted); }
.col-header { display:grid; grid-template-columns:1fr 48px 48px 60px; padding:5px 10px; border-bottom:1px solid var(--border); color:var(--muted); font-size:10px; }
.col-header span { cursor:pointer; user-select:none; }
.col-header span:hover { color:var(--text); }
.coin-list { flex:1; overflow-y:auto; }
.coin-list::-webkit-scrollbar { width:3px; }
.coin-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.coin-row { display:grid; grid-template-columns:1fr 48px 48px 60px; padding:5px 10px; border-bottom:1px solid #33333322; cursor:pointer; transition:background .1s; align-items:center; }
.coin-row:hover { background:var(--bg3); }
.coin-row.selected { background:#2dd4bf12; border-left:2px solid var(--teal); }
.coin-name { font-size:12px; font-weight:600; }
.coin-exch { font-size:9px; color:var(--muted); margin-top:1px; }
.val { text-align:right; font-size:11px; }
.up { color:var(--up); } .dn { color:var(--dn); } .muted { color:var(--muted); }
.natr-badge { font-size:9px; padding:1px 4px; border-radius:3px; background:#2dd4bf15; color:var(--teal); border:1px solid #2dd4bf30; }
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.toolbar { background:var(--bg2); border-bottom:1px solid var(--border); padding:6px 10px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.tb-sep { width:1px; height:16px; background:var(--border); margin:0 2px; }
.tb-label { font-size:10px; color:var(--muted); white-space:nowrap; }
.btn { background:var(--bg3); border:1px solid var(--border); color:var(--muted); padding:3px 9px; border-radius:4px; cursor:pointer; font-size:11px; font-family:'IBM Plex Sans',sans-serif; transition:all .15s; white-space:nowrap; }
.btn:hover { border-color:var(--teal); color:var(--text); }
.btn.active { background:#2dd4bf22; border-color:var(--teal); color:var(--teal); }
.btn-bi { color:#f0b90b; border-color:#f0b90b33; }
.btn-bi.active { background:#f0b90b18; border-color:#f0b90b; color:#f0b90b; }
.btn-ok { color:#a78bfa; border-color:#a78bfa33; }
.btn-ok.active { background:#a78bfa18; border-color:#a78bfa; color:#a78bfa; }
.btn-by { color:#fb923c; border-color:#fb923c33; }
.btn-by.active { background:#fb923c18; border-color:#fb923c; color:#fb923c; }
.tb-filter { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:3px 7px; border-radius:4px; font-family:'IBM Plex Sans',sans-serif; font-size:11px; width:70px; }
.tb-filter:focus { outline:none; border-color:var(--teal); }
.tb-filter::placeholder { color:var(--muted); }
.charts-area { flex:1; overflow:hidden; padding:6px; display:grid; gap:6px; }
.chart-card { background:var(--bg2); border:1px solid var(--border); border-radius:6px; display:flex; flex-direction:column; overflow:hidden; cursor:pointer; transition:border-color .2s; }
.chart-card:hover { border-color:#2dd4bf44; }
.chart-header { padding:5px 8px; border-bottom:1px solid var(--border); }
.chart-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
.chart-ticker { font-size:13px; font-weight:700; }
.chart-indicators { display:flex; gap:4px; flex-wrap:wrap; }
.ind { font-size:9px; padding:1px 5px; border-radius:3px; white-space:nowrap; display:inline-flex; align-items:center; gap:2px; }
.ind-up { background:#2dd4bf12; color:var(--teal); border:1px solid #2dd4bf30; }
.ind-dn { background:#fb923c12; color:var(--orange); border:1px solid #fb923c30; }
.ind-teal { background:#2dd4bf12; color:var(--teal); border:1px solid #2dd4bf30; }
.ind-orange { background:#fb923c12; color:var(--orange); border:1px solid #fb923c30; }
.ind-gray { background:#88888812; color:#aaaaaa; border:1px solid #88888830; }
.ind-vol { background:#a78bfa12; color:#a78bfa; border:1px solid #a78bfa30; }
.chart-body { flex:1; position:relative; min-height:0; }
.fs-toolbar { padding:6px 10px; border-bottom:1px solid var(--border); background:var(--bg2); display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.tool-btn { background:var(--bg3); border:1px solid var(--border); color:var(--muted); padding:3px 10px; border-radius:4px; cursor:pointer; font-size:11px; font-family:'IBM Plex Sans',sans-serif; transition:all .15s; display:flex; align-items:center; gap:4px; }
.tool-btn:hover { border-color:var(--teal); color:var(--text); }
.tool-btn.active { background:#2dd4bf18; border-color:var(--teal); color:var(--teal); }
.tool-btn.danger:hover { border-color:var(--orange); color:var(--orange); }
.fullscreen-overlay { display:none; position:fixed; inset:0; background:#18181888; z-index:1000; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
.fullscreen-overlay.open { display:flex; }
.fs-popup { width:calc(100vw - 80px); height:calc(100vh - 80px); background:var(--bg2); border:1px solid var(--border); border-radius:10px; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 24px 80px #00000099; }
.fs-header { padding:8px 14px; border-bottom:1px solid var(--border); background:var(--bg2); display:flex; align-items:center; justify-content:space-between; border-radius:10px 10px 0 0; }
.fs-indicators { display:flex; gap:5px; flex-wrap:wrap; padding:6px 10px; border-bottom:1px solid var(--border); background:var(--bg2); }
.fs-body { flex:1; min-height:0; }
.close-btn { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:4px 12px; border-radius:4px; cursor:pointer; font-family:'IBM Plex Sans',sans-serif; font-size:12px; }
.close-btn:hover { border-color:var(--orange); color:var(--orange); }
.status-bar { padding:3px 12px; background:var(--bg2); border-top:1px solid var(--border); font-size:10px; color:var(--muted); display:flex; gap:16px; align-items:center; }
.dot { width:6px; height:6px; border-radius:50%; background:var(--teal); display:inline-block; margin-right:4px; animation:pulse 2s infinite; }
.dot.red { background:var(--orange); }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
.flash-up { animation: flashUp 0.5s ease; }
.flash-dn { animation: flashDn 0.5s ease; }
@keyframes flashUp { 0%{background:#2dd4bf22} 100%{background:transparent} }
@keyframes flashDn { 0%{background:#fb923c22} 100%{background:transparent} }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Монеты</span>
      <span id="coin-count" style="font-size:10px;color:var(--muted)">—</span>
    </div>
    <div class="filter-row">
      <input class="filter-input" id="search" placeholder="Поиск тикера..." />
    </div>
    <div class="filter-row">
      <span style="font-size:10px;color:var(--muted);width:100%;margin-bottom:3px">Объём 24h (млн $):</span>
      <div class="range-inputs">
        <input class="range-input" id="vol-min" placeholder="от" type="number" min="0" oninput="applyFilters()"/>
        <input class="range-input" id="vol-max" placeholder="до" type="number" min="0" oninput="applyFilters()"/>
      </div>
    </div>
    <div class="filter-row">
      <span style="font-size:10px;color:var(--muted);width:100%;margin-bottom:3px">NATR (%):</span>
      <div class="range-inputs">
        <input class="range-input" id="natr-min" placeholder="от" type="number" step="0.1" oninput="applyFilters()"/>
        <input class="range-input" id="natr-max" placeholder="до" type="number" step="0.1" oninput="applyFilters()"/>
      </div>
    </div>
    <div class="filter-row">
      <span style="font-size:10px;color:var(--muted);width:100%;margin-bottom:3px">Изменение цены (%):</span>
      <div class="range-inputs">
        <input class="range-input" id="chg-min" placeholder="от" type="number" step="0.1" oninput="applyFilters()"/>
        <input class="range-input" id="chg-max" placeholder="до" type="number" step="0.1" oninput="applyFilters()"/>
      </div>
    </div>
    <div class="col-header">
      <span onclick="setSort('symbol')">Тикер <span id="sort-symbol"></span></span>
      <span onclick="setSort('change')" style="text-align:right" title="Изменение цены"><i class="ti ti-percent" style="font-size:11px"></i> <span id="sort-change"></span></span>
      <span onclick="setSort('natr')" style="text-align:right" title="NATR волатильность"><i class="ti ti-activity" style="font-size:11px"></i> <span id="sort-natr">▼</span></span>
      <span onclick="setSort('volume')" style="text-align:right" title="Объём 24h"><i class="ti ti-chart-bar" style="font-size:11px"></i> <span id="sort-volume"></span></span>
    </div>
    <div class="coin-list" id="coin-list"></div>
  </div>

  <div class="main">
    <div class="toolbar">
      <span class="tb-label">БИРЖА:</span>
      <button class="btn btn-bi active" id="ex-BI" onclick="setExchange('BI')">BI-F</button>
      <button class="btn btn-ok" id="ex-OK" onclick="setExchange('OK')">OK-F</button>
      <button class="btn btn-by" id="ex-BY" onclick="setExchange('BY')">BY-F</button>
      <div class="tb-sep"></div>
      <span class="tb-label">ТФ:</span>
      <button class="btn active" id="tf-1m" onclick="setTf('1m')">1м</button>
      <button class="btn" id="tf-5m" onclick="setTf('5m')">5м</button>
      <button class="btn" id="tf-15m" onclick="setTf('15m')">15м</button>
      <button class="btn" id="tf-1h" onclick="setTf('1h')">1ч</button>
      <button class="btn" id="tf-4h" onclick="setTf('4h')">4ч</button>
      <button class="btn" id="tf-1d" onclick="setTf('1d')">1д</button>
      <button class="btn" id="tf-1w" onclick="setTf('1w')">1н</button>
      <div class="tb-sep"></div>
      <span class="tb-label">СЕТКА:</span>
      <button class="btn" id="grid-1" onclick="setGrid(1,1)">1×1</button>
      <button class="btn" id="grid-2" onclick="setGrid(2,2)">2×2</button>
      <button class="btn active" id="grid-3" onclick="setGrid(3,3)">3×3</button>
      <div class="tb-sep"></div>
      <span class="tb-label">СОРТ:</span>
      <button class="btn active" id="sort-btn-natr" onclick="setSort('natr')">NATR ↓</button>
      <button class="btn" id="sort-btn-volume" onclick="setSort('volume')">ОБЪ ↓</button>
      <button class="btn" id="sort-btn-change" onclick="setSort('change')">ИЗМ ↓</button>
    </div>
    <div class="charts-area" id="charts-area"></div>
    <div class="status-bar">
      <span><span class="dot" id="ws-dot"></span><span id="ws-status">Подключение...</span></span>
      <span id="status-text">—</span>
      <span id="last-update" style="margin-left:auto">—</span>
    </div>
  </div>
</div>

<div class="fullscreen-overlay" id="fs-overlay">
  <div class="fs-popup">
    <div class="fs-header">
    <div style="display:flex;align-items:center;gap:12px">
      <span id="fs-ticker" style="font-size:16px;font-weight:700"></span>
      <span id="fs-price" style="font-size:15px;font-weight:700"></span>
      <span id="fs-change" style="font-size:13px"></span>
      <span style="font-size:10px;color:var(--muted)" id="fs-meta"></span>
    </div>
    <button class="close-btn" onclick="closeFullscreen()">✕ Закрыть</button>
  </div>
  <div class="fs-indicators" id="fs-indicators"></div>
  <div class="fs-toolbar">
    <span class="tb-label">ТФ:</span>
    <button class="tool-btn" id="fs-tf-1m" onclick="setFsTf('1m')">1м</button>
    <button class="tool-btn" id="fs-tf-5m" onclick="setFsTf('5m')">5м</button>
    <button class="tool-btn" id="fs-tf-15m" onclick="setFsTf('15m')">15м</button>
    <button class="tool-btn" id="fs-tf-1h" onclick="setFsTf('1h')">1ч</button>
    <button class="tool-btn" id="fs-tf-4h" onclick="setFsTf('4h')">4ч</button>
    <button class="tool-btn" id="fs-tf-1d" onclick="setFsTf('1d')">1д</button>
    <button class="tool-btn" id="fs-tf-1w" onclick="setFsTf('1w')">1н</button>
    <div class="tb-sep"></div>
    <span class="tb-label">ИНСТР:</span>
    <button class="tool-btn" id="tool-none" onclick="setTool('none')"><i class="ti ti-pointer"></i> Курсор</button>
    <button class="tool-btn" id="tool-hline" onclick="setTool('hline')"><i class="ti ti-minus"></i> Уровень</button>
    <button class="tool-btn" id="tool-ray" onclick="setTool('ray')"><i class="ti ti-arrow-up-right"></i> Луч</button>
    <button class="tool-btn" id="tool-segment" onclick="setTool('segment')"><i class="ti ti-line"></i> Сегмент</button>
    <button class="tool-btn" id="tool-channel" onclick="setTool('channel')"><i class="ti ti-layout-rows"></i> Канал</button>
    <button class="tool-btn" id="tool-ruler" onclick="setTool('ruler')"><i class="ti ti-ruler"></i> Линейка</button>
    <div class="tb-sep"></div>
    <button class="tool-btn danger" onclick="clearDrawings()"><i class="ti ti-trash"></i> Очистить</button>
  </div>
  <div class="fs-body" id="fs-body"></div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────
const EXCHANGES = {
  BY: {
    name: 'Bybit',
    restTickers: 'https://api.bybit.com/v5/market/tickers?category=linear',
    restKlines: (sym, tf, limit) => `https://api.bybit.com/v5/market/kline?category=linear&symbol=${sym}USDT&interval=${bybitTf(tf)}&limit=${limit}`,
    wsUrl: 'wss://stream.bybit.com/v5/public/linear',
    label: 'BY-F'
  },
  OK: {
    name: 'OKX',
    restTickers: 'https://www.okx.com/api/v5/market/tickers?instType=SWAP',
    restKlines: (sym, tf, limit) => `https://www.okx.com/api/v5/market/candles?instId=${sym}-USDT-SWAP&bar=${okxTf(tf)}&limit=${limit}`,
    wsUrl: 'wss://ws.okx.com:8443/ws/v5/public',
    label: 'OK-F'
  }
};

function bybitTf(tf) { return {'1m':'1','5m':'5','15m':'15','1h':'60','4h':'240','1d':'D','1w':'W'}[tf]||'1'; }
function okxTf(tf) { return {'1m':'1m','5m':'5m','15m':'15m','1h':'1H','4h':'4H','1d':'1D','1w':'1W'}[tf]||'1m'; }

// ── STATE ─────────────────────────────────────────────────────────────
let allCoins=[], filteredCoins=[], selectedCoins=[];
let currentTf='1m', gridCols=3, gridRows=3;
let sortKey='natr', sortDir=-1, searchQ='';
let currentExchange='BI';
let chartInstances={};
let fsChart=null, fsSymbol=null, fsTf='1m';
let activeTool='none';
let drawings={}; // symbol -> array of line objects
let ws=null, wsReconnectTimer=null;
let priceMap={}; // symbol -> latest price data

// ── HELPERS ───────────────────────────────────────────────────────────
function fmtPrice(p) {
  if (!p) return '0';
  return p<0.0001?p.toFixed(8):p<0.01?p.toFixed(6):p<1?p.toFixed(4):p<100?p.toFixed(3):p.toFixed(2);
}
function fmtVol(v) { return v>=1000?(v/1000).toFixed(1)+'B':v.toFixed(0)+'M'; }
function getNum(id) { const v=parseFloat(document.getElementById(id)?.value); return isNaN(v)?null:v; }

// Cloudflare Worker proxy — свой сервер, работает со всеми биржами
const CF_WORKER = 'https://screener-proxy.julia-s-designn-330.workers.dev/';

async function proxyFetch(url) {
  const r = await fetch(CF_WORKER + '?url=' + encodeURIComponent(url));
  if (!r.ok) throw new Error('Proxy error: ' + r.status);
  return await r.json();
}

// ── REST: TICKERS ─────────────────────────────────────────────────────
async function fetchBinanceTickers() {
  const j = await proxyFetch('https://fapi.binance.com/fapi/v1/ticker/24hr');
  return (Array.isArray(j)?j:[]).filter(d=>d.symbol.endsWith('USDT')).map(d=>{
    const price=+d.lastPrice, high=+d.highPrice, low=+d.lowPrice;
    const natr = price>0?(high-low)/price*100:0;
    return {
      symbol: d.symbol.replace('USDT',''),
      price, change:+d.priceChangePercent,
      volume:+d.quoteVolume/1e6,
      natr:+natr.toFixed(2),
      trades:+d.count||0,
      high, low, exchange:'BI-F'
    };
  });
}

async function fetchBinanceKlines(symbol, tf, limit=120) {
  const j = await proxyFetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}USDT&interval=${tf}&limit=${limit}`);
  return (Array.isArray(j)?j:[]).map(k=>({
    time:+k[0]/1000, open:+k[1], high:+k[2], low:+k[3], close:+k[4], volume:+k[5]
  }));
}

async function fetchBybitTickers() {
  const j = await proxyFetch(EXCHANGES.BY.restTickers);
  return (j.result?.list||[])
    .filter(d=>d.symbol.endsWith('USDT') && d.lastPrice>0)
    .map(d=>{
      const price=+d.lastPrice, high=+d.highPrice24h, low=+d.lowPrice24h;
      const natr = price>0?(high-low)/price*100:0;
      return {
        symbol: d.symbol.replace('USDT',''),
        price, change:+d.price24hPcnt*100,
        volume:+d.turnover24h/1e6,
        natr:+natr.toFixed(2),
        trades:+d.count||0,
        high, low, exchange:'BY-F'
      };
    });
}

async function fetchOkxTickers() {
  const j = await proxyFetch(EXCHANGES.OK.restTickers);
  return (j.data||[])
    .filter(d=>d.instId.endsWith('-USDT-SWAP'))
    .map(d=>{
      const price=+d.last, open24h=+d.open24h, high=+d.high24h, low=+d.low24h;
      const natr = price>0?(high-low)/price*100:0;
      const change = open24h>0 ? (price-open24h)/open24h*100 : 0;
      return {
        symbol: d.instId.replace('-USDT-SWAP',''),
        price, change:+change.toFixed(2),
        volume:+d.volCcy24h>0?+d.volCcy24h:+d.vol24h*price/1e6,
        natr:+natr.toFixed(2),
        trades:0,
        high, low, exchange:'OK-F'
      };
    });
}

async function loadTickers() {
  document.getElementById('status-text').textContent='Загрузка тикеров...';
  try {
    let coins;
    if (currentExchange==='BY') coins = await fetchBybitTickers();
    else if (currentExchange==='OK') coins = await fetchOkxTickers();
    else { 
      const coins = await fetchBinanceTickers();
      allCoins = coins;
      coins.forEach(c=>{ priceMap[c.symbol]={price:c.price, change:c.change}; });
      document.getElementById('last-update').textContent = new Date().toLocaleTimeString('ru');
      document.getElementById('status-text').textContent = `${coins.length} монет · Binance`;
      applyFilters();
      connectWebSocket();
      return;
    }

    allCoins = coins;
    // sync priceMap
    coins.forEach(c=>{ priceMap[c.symbol]={price:c.price, change:c.change}; });
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString('ru');
    document.getElementById('status-text').textContent = `${coins.length} монет · ${EXCHANGES[currentExchange]?.name}`;
    applyFilters();
    connectWebSocket();
  } catch(e) {
    console.error(e);
    document.getElementById('status-text').textContent='Ошибка: '+e.message;
  }
}

// ── REST: KLINES ──────────────────────────────────────────────────────
async function fetchBybitKlines(symbol, tf, limit=120) {
  const url = EXCHANGES.BY.restKlines(symbol, tf, limit);
  const j = await proxyFetch(url);
  return (j.result?.list||[]).reverse().map(k=>({
    time:+k[0]/1000, open:+k[1], high:+k[2], low:+k[3], close:+k[4], volume:+k[5]
  }));
}

async function fetchOkxKlines(symbol, tf, limit=120) {
  const url = EXCHANGES.OK.restKlines(symbol, tf, limit);
  const j = await proxyFetch(url);
  return (j.data||[]).reverse().map(k=>({
    time:+k[0]/1000, open:+k[1], high:+k[2], low:+k[3], close:+k[4], volume:+k[5]
  }));
}

async function fetchKlines(symbol, tf, limit=120) {
  if (currentExchange==='BY') return fetchBybitKlines(symbol, tf, limit);
  if (currentExchange==='OK') return fetchOkxKlines(symbol, tf, limit);
  if (currentExchange==='BI') return fetchBinanceKlines(symbol, tf, limit);
  return [];
}

// ── WEBSOCKET ─────────────────────────────────────────────────────────
function connectWebSocket() {
  if (ws) { try{ ws.close(); }catch(e){} ws=null; }
  if (wsReconnectTimer) clearTimeout(wsReconnectTimer);

  const exc = EXCHANGES[currentExchange];
  if (!exc) return;

  setWsStatus('connecting');
  ws = new WebSocket(exc.wsUrl);

  ws.onopen = () => {
    setWsStatus('connected');
    subscribeWs();
  };

  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (currentExchange==='BY') handleBybitMsg(data);
      else if (currentExchange==='OK') handleOkxMsg(data);
    } catch(err){}
  };

  ws.onerror = () => setWsStatus('error');
  ws.onclose = () => {
    setWsStatus('disconnected');
    wsReconnectTimer = setTimeout(connectWebSocket, 3000);
  };
}

function subscribeWs() {
  if (!ws || ws.readyState!==1) return;
  const syms = allCoins.slice(0,200).map(c=>c.symbol);

  if (currentExchange==='BY') {
    // Bybit: subscribe in batches of 10
    for (let i=0; i<syms.length; i+=10) {
      const batch = syms.slice(i,i+10).map(s=>`tickers.${s}USDT`);
      ws.send(JSON.stringify({ op:'subscribe', args: batch }));
    }
  } else if (currentExchange==='OK') {
    const args = syms.slice(0,100).map(s=>({ channel:'tickers', instId:`${s}-USDT-SWAP` }));
    ws.send(JSON.stringify({ op:'subscribe', args }));
  }
}

function handleBybitMsg(data) {
  if (data.topic && data.topic.startsWith('tickers.') && data.data) {
    const d = data.data;
    const sym = d.symbol?.replace('USDT','');
    if (!sym) return;
    const price = +d.lastPrice;
    const change = +d.price24hPcnt*100;
    if (!price) return;

    const prev = priceMap[sym];
    priceMap[sym] = { price, change };

    // update coin in allCoins
    const coin = allCoins.find(c=>c.symbol===sym);
    if (coin) {
      coin.price = price;
      coin.change = change;
      if (d.highPrice24h) coin.high = +d.highPrice24h;
      if (d.lowPrice24h) coin.low = +d.lowPrice24h;
      if (d.turnover24h) coin.volume = +d.turnover24h/1e6;
      if (coin.price>0) coin.natr = +((coin.high-coin.low)/coin.price*100).toFixed(2);
    }

    // flash price in grid
    updateChartPrice(sym, price, change, prev?.price);
  }
}

function handleOkxMsg(data) {
  if (data.arg?.channel==='tickers' && data.data?.[0]) {
    const d = data.data[0];
    const sym = d.instId?.replace('-USDT-SWAP','');
    if (!sym) return;
    const price = +d.last;
    const change = +d.sodUtc8*100;
    if (!price) return;
    const prev = priceMap[sym];
    priceMap[sym] = { price, change };
    const coin = allCoins.find(c=>c.symbol===sym);
    if (coin) { coin.price=price; coin.change=change; }
    updateChartPrice(sym, price, change, prev?.price);
  }
}

function setWsStatus(state) {
  const dot = document.getElementById('ws-dot');
  const txt = document.getElementById('ws-status');
  if (state==='connected') { dot.className='dot'; txt.textContent='Live'; }
  else if (state==='connecting') { dot.className='dot'; dot.style.background='var(--yellow)'; txt.textContent='Подключение...'; }
  else { dot.className='dot red'; txt.textContent='Переподключение...'; }
}

// ── FILTERS ───────────────────────────────────────────────────────────
function applyFilters() {
  let coins = [...allCoins];
  // минимальный объём 500к$ (0.5M) и минимальный NATR 0.1% (убираем стейблкоины)
  coins = coins.filter(c=>c.volume >= 0.5 && c.natr >= 0.1);
  if (searchQ) coins=coins.filter(c=>c.symbol.includes(searchQ.toUpperCase()));
  const volMin=getNum('vol-min'), volMax=getNum('vol-max');
  const natrMin=getNum('natr-min'), natrMax=getNum('natr-max');
  const chgMin=getNum('chg-min'), chgMax=getNum('chg-max');
  if (volMin!=null) coins=coins.filter(c=>c.volume>=volMin);
  if (volMax!=null) coins=coins.filter(c=>c.volume<=volMax);
  if (natrMin!=null) coins=coins.filter(c=>c.natr>=natrMin);
  if (natrMax!=null) coins=coins.filter(c=>c.natr<=natrMax);
  if (chgMin!=null) coins=coins.filter(c=>c.change>=chgMin);
  if (chgMax!=null) coins=coins.filter(c=>c.change<=chgMax);
  coins.sort((a,b)=>{ const av=a[sortKey],bv=b[sortKey]; return typeof av==='string'?sortDir*av.localeCompare(bv):sortDir*(bv-av); });
  filteredCoins=coins;
  document.getElementById('coin-count').textContent=coins.length;
  renderList();
  // графики всегда показывают топ монет по текущей сортировке
  const maxSlots=gridCols*gridRows;
  selectedCoins=coins.slice(0,maxSlots).map(c=>c.symbol);
  renderCharts();
}

function setSort(key) {
  if (sortKey===key) sortDir*=-1; else { sortKey=key; sortDir=-1; }
  ['symbol','change','natr','volume'].forEach(k=>{ const el=document.getElementById('sort-'+k); if(el) el.textContent=k===sortKey?(sortDir>0?'▲':'▼'):''; });
  ['volume','natr','change'].forEach(k=>{
    const btn=document.getElementById('sort-btn-'+k);
    if (!btn) return;
    const labels={'volume':'ОБЪ','natr':'NATR','change':'ИЗМ'};
    btn.textContent = labels[k]+(k===sortKey?(sortDir>0?' ↑':' ↓'):'  ↓');
    btn.classList.toggle('active', k===sortKey);
  });
  // пересортировать и перерисовать графики
  filteredCoins.sort((a,b)=>{ const av=a[sortKey],bv=b[sortKey]; return typeof av==='string'?sortDir*av.localeCompare(bv):sortDir*(bv-av); });
  const maxSlots=gridCols*gridRows;
  selectedCoins=filteredCoins.slice(0,maxSlots).map(c=>c.symbol);
  renderList();
  renderCharts();
}

// ── LIST ──────────────────────────────────────────────────────────────
let isDragging=false, dragAction=null; // dragAction: 'add' | 'remove'

function renderList() {
  document.getElementById('coin-list').innerHTML=filteredCoins.slice(0,300).map(c=>{
    const sel=selectedCoins.includes(c.symbol)?'selected':'';
    const cls=c.change>=0?'up':'dn';
    return `<div class="coin-row ${sel}" id="row-${c.symbol}"
      onmousedown="startDrag(event,'${c.symbol}')"
      onmouseenter="onDragEnter('${c.symbol}')"
      onclick="selectCoin('${c.symbol}')">
      <div><div class="coin-name">${c.symbol}</div><div class="coin-exch">${c.exchange}</div></div>
      <div class="val ${cls}" id="row-chg-${c.symbol}">${c.change>=0?'+':''}${c.change.toFixed(1)}%</div>
      <div class="val"><span class="natr-badge">${c.natr.toFixed(1)}</span></div>
      <div class="val muted">${fmtVol(c.volume)}</div>
    </div>`;
  }).join('');
}

function startDrag(e, symbol) {
  if (e.button!==0) return;
  isDragging=true;
  dragAction=selectedCoins.includes(symbol)?'remove':'add';
  // don't toggle here — click handles single tap
  document.addEventListener('mouseup', stopDrag, {once:true});
  e.preventDefault(); // prevent text selection
}

function onDragEnter(symbol) {
  if (!isDragging) return;
  const maxSlots=gridCols*gridRows;
  if (dragAction==='add' && !selectedCoins.includes(symbol)) {
    if (selectedCoins.length>=maxSlots) selectedCoins.shift();
    selectedCoins.push(symbol);
    const row=document.getElementById('row-'+symbol);
    if (row) row.classList.add('selected');
    renderCharts();
  } else if (dragAction==='remove' && selectedCoins.includes(symbol)) {
    selectedCoins=selectedCoins.filter(s=>s!==symbol);
    const row=document.getElementById('row-'+symbol);
    if (row) row.classList.remove('selected');
    renderCharts();
  }
}

function stopDrag() {
  isDragging=false;
  dragAction=null;
}

function selectCoin(symbol) {
  const idx=selectedCoins.indexOf(symbol);
  const maxSlots=gridCols*gridRows;
  if (idx>=0) selectedCoins.splice(idx,1);
  else { if(selectedCoins.length>=maxSlots) selectedCoins.shift(); selectedCoins.push(symbol); }
  renderList();
  renderCharts();
}

// ── INDICATORS ────────────────────────────────────────────────────────
function buildIndicators(coin, full=false) {
  if (!coin) return '';
  const cls=coin.change>=0?'ind-up':'ind-dn';
  const range=coin.price>0?((coin.high-coin.low)/coin.price*100).toFixed(2):0;
  const trades=coin.trades>=1000?(coin.trades/1000).toFixed(0)+'K':coin.trades||'—';
  let html=`<span class="ind ${cls}">${coin.change>=0?'+':''}${coin.change.toFixed(2)}%</span>
    <span class="ind ind-teal" title="Ренж цены"><i class="ti ti-arrows-horizontal"></i> ${range}%</span>
    <span class="ind ind-teal" title="NATR — волатильность"><i class="ti ti-activity"></i> ${coin.natr.toFixed(2)}%</span>
    <span class="ind ind-gray" title="Сделок"><i class="ti ti-bolt"></i> ${trades}</span>
    <span class="ind ind-vol" title="Объём 24h"><i class="ti ti-chart-bar"></i> ${fmtVol(coin.volume)}</span>`;
  if (full) html+=`<span class="ind ind-gray"><i class="ti ti-arrow-up"></i> ${fmtPrice(coin.high)}</span><span class="ind ind-gray"><i class="ti ti-arrow-down"></i> ${fmtPrice(coin.low)}</span>`;
  return html;
}

// ── CHART SETUP ───────────────────────────────────────────────────────
function makeChartOpts(w,h) {
  return { width:w, height:h,
    layout:{ background:{color:'#202020'}, textColor:'#888888' },
    grid:{ vertLines:{color:'#2a2a2a'}, horzLines:{color:'#2a2a2a'} },
    crosshair:{ mode:LightweightCharts.CrosshairMode.Normal },
    rightPriceScale:{ borderColor:'#333333', scaleMargins:{top:0.05,bottom:0.2} },
    timeScale:{ borderColor:'#333333', timeVisible:true, secondsVisible:false },
    handleScroll:true, handleScale:true };
}

function setupChart(container, w, h) {
  const chart = LightweightCharts.createChart(container, makeChartOpts(w,h));
  const candles = chart.addCandlestickSeries({
    upColor:'#2dd4bf', downColor:'#fb923c',
    borderUpColor:'#2dd4bf', borderDownColor:'#fb923c',
    wickUpColor:'#2dd4bf', wickDownColor:'#fb923c'
  });
  const volume = chart.addHistogramSeries({ priceFormat:{type:'volume'}, priceScaleId:'vol' });
  chart.priceScale('vol').applyOptions({ scaleMargins:{top:0.85,bottom:0} });
  return { chart, candles, volume };
}

function setKlines(inst, klines) {
  if (!klines.length) return;
  inst.candles.setData(klines);
  inst.volume.setData(klines.map(k=>({ time:k.time, value:k.volume, color:k.close>=k.open?'#2dd4bf33':'#fb923c33' })));
  inst.chart.timeScale().fitContent();
}

// ── REALTIME PRICE UPDATE ─────────────────────────────────────────────
function updateChartPrice(sym, price, change, prevPrice) {
  // update row in list
  const chgEl = document.getElementById('row-chg-'+sym);
  if (chgEl) {
    chgEl.textContent = (change>=0?'+':'')+change.toFixed(1)+'%';
    chgEl.className = 'val '+(change>=0?'up':'dn');
  }
  // flash row
  const row = document.getElementById('row-'+sym);
  if (row && prevPrice) {
    row.classList.remove('flash-up','flash-dn');
    void row.offsetWidth;
    row.classList.add(price>=prevPrice?'flash-up':'flash-dn');
  }
  // update chart header
  const priceEl = document.getElementById('cprice-'+sym);
  const chgEl2 = document.getElementById('cchg-'+sym);
  if (priceEl) { priceEl.textContent='$'+fmtPrice(price); priceEl.className='chart-price '+(change>=0?'up':'dn'); }
  if (chgEl2) { chgEl2.textContent=(change>=0?'+':'')+change.toFixed(2)+'%'; chgEl2.className=(change>=0?'up':'dn')+' chart-chg'; }
  // update fs if open
  if (fsSymbol===sym) {
    const fp=document.getElementById('fs-price'), fc=document.getElementById('fs-change');
    if(fp){ fp.textContent='$'+fmtPrice(price); fp.className='chart-price '+(change>=0?'up':'dn'); }
    if(fc){ fc.textContent=(change>=0?'+':'')+change.toFixed(2)+'%'; fc.className=(change>=0?'up':'dn'); }
  }
}

// ── CHARTS GRID ───────────────────────────────────────────────────────
async function renderCharts() {
  const area=document.getElementById('charts-area');
  Object.values(chartInstances).forEach(i=>{ try{i.chart.remove();}catch(e){} });
  chartInstances={};
  area.style.gridTemplateColumns=`repeat(${gridCols},1fr)`;
  area.style.gridTemplateRows=`repeat(${gridRows},1fr)`;
  const maxSlots=gridCols*gridRows;
  let symbols=selectedCoins.slice(0,maxSlots);
  if (!symbols.length && filteredCoins.length) { selectedCoins=filteredCoins.slice(0,maxSlots).map(c=>c.symbol); symbols=[...selectedCoins]; }

  area.innerHTML=symbols.map(sym=>{
    const coin=allCoins.find(c=>c.symbol===sym)||{};
    const cls=(coin.change||0)>=0?'up':'dn';
    return `<div class="chart-card" id="card-${sym}">
      <div class="chart-header">
        <div class="chart-top">
          <span class="chart-ticker">${sym} <span style="font-size:9px;color:var(--muted);font-weight:400">${coin.exchange||''} · ${currentTf}</span></span>
          <div style="display:flex;align-items:center;gap:6px">
            <span class="chart-price ${cls}" id="cprice-${sym}">$${fmtPrice(coin.price||0)}</span>
            <span class="${cls} chart-chg" id="cchg-${sym}" style="font-size:11px">${(coin.change||0)>=0?'+':''}${(coin.change||0).toFixed(2)}%</span>
          </div>
        </div>
        <div class="chart-indicators" id="inds-${sym}">${buildIndicators(coin)}</div>
      </div>
      <div class="chart-body" id="body-${sym}"></div>
    </div>`;
  }).join('');

  for (const sym of symbols) {
    const bodyEl=document.getElementById('body-'+sym);
    const cardEl=document.getElementById('card-'+sym);
    if (!bodyEl) continue;
    const inst = setupChart(bodyEl, bodyEl.clientWidth||300, bodyEl.clientHeight||120);
    chartInstances[sym]=inst;
    cardEl.addEventListener('dblclick', ()=>openFullscreen(sym));
    fetchKlines(sym, currentTf).then(klines=>setKlines(inst, klines));
  }
}

// ── FULLSCREEN ────────────────────────────────────────────────────────
async function openFullscreen(symbol) {

  document.getElementById('fs-change').textContent=((coin.change||0)>=0?'+':'')+(coin.change||0).toFixed(2)+'%';
  document.getElementById('fs-indicators').innerHTML=buildIndicators(coin,true);
  // sync tf buttons
  document.querySelectorAll('[id^="fs-tf-"]').forEach(b=>b.classList.remove('active'));
  const tfBtn=document.getElementById('fs-tf-'+fsTf);
  if(tfBtn) tfBtn.classList.add('active');

function closeFullscreen() {

document.getElementById('fs-overlay').addEventListener('click', e=>{ if(e.target===document.getElementById('fs-overlay')) closeFullscreen(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeFullscreen(); });

function setFsTf(tf) {

// ── DRAWING TOOLS ─────────────────────────────────────────────────────
let drawCanvas=null, drawCtx=null;
let drawingStart=null;   // first click point {x,y,price}
let mousePos={x:0,y:0}; // current mouse position for preview
// drawings[symbol] = [{type, x1,y1,x2,y2, price1,price2}]

function setTool(tool) {
  activeTool=tool;
  drawingStart=null; // cancel any in-progress drawing
  document.querySelectorAll('[id^="tool-"]').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('tool-'+tool);
  if(btn) btn.classList.add('active');
  if(drawCanvas) {
    drawCanvas.style.pointerEvents = tool==='none' ? 'none' : 'auto';
    drawCanvas.style.cursor = tool==='none' ? 'default' : 'crosshair';
  }
  redrawAll();
}

function initDrawCanvas() {
  const fsBody=document.getElementById('fs-body');
  const old=document.getElementById('draw-canvas');
  if(old) old.remove();
  drawCanvas=document.createElement('canvas');
  drawCanvas.id='draw-canvas';
  drawCanvas.style.cssText='position:absolute;inset:0;width:100%;height:100%;z-index:10;pointer-events:none;';
  drawCanvas.width=fsBody.clientWidth;
  drawCanvas.height=fsBody.clientHeight;
  fsBody.style.position='relative';
  fsBody.appendChild(drawCanvas);
  drawCtx=drawCanvas.getContext('2d');
  drawCanvas.addEventListener('click', onDrawClick);
  drawCanvas.addEventListener('mousemove', onDrawMouseMove);
  drawCanvas.addEventListener('contextmenu', onDrawRightClick);
}

// Convert canvas Y coordinate to price using candle series
function yToPrice(y) {
  if(!fsChart) return 0;
  try { return fsChart.candles.coordinateToPrice(y) || 0; } catch(e){ return 0; }
}

// Convert price to canvas Y
function priceToY(price) {
  if(!fsChart) return 0;
  try { return fsChart.candles.priceToCoordinate(price) || 0; } catch(e){ return 0; }
}

function getCanvasPos(e) {
  if(!drawCanvas) return {x:0,y:0};
  const rect=drawCanvas.getBoundingClientRect();
  return { x:e.clientX-rect.left, y:e.clientY-rect.top };
}

// CLICK: first click sets start, second click finalizes
function onDrawClick(e) {
  if(activeTool==='none') return;
  e.preventDefault(); e.stopPropagation();
  const pos=getCanvasPos(e);
  const price=yToPrice(pos.y);

  if(!drawingStart) {
    // First click — set start point
    drawingStart={x:pos.x, y:pos.y, price};
  } else {
    // Second click — finalize
    if(!drawings[fsSymbol]) drawings[fsSymbol]=[];
    drawings[fsSymbol].push({
      type:activeTool,
      x1:drawingStart.x, y1:drawingStart.y, price1:drawingStart.price,
      x2:pos.x, y2:pos.y, price2:price
    });
    drawingStart=null;
    redrawAll();
  }
}

// MOUSEMOVE: show preview after first click
function onDrawMouseMove(e) {
  if(activeTool==='none') return;
  const pos=getCanvasPos(e);
  mousePos={x:pos.x, y:pos.y};
  redrawAll();
  // draw crosshair
  drawCrosshair(pos.x, pos.y);
  // draw preview if first point set
  if(drawingStart) {
    drawShape(drawCtx, activeTool, drawingStart.x, drawingStart.y, pos.x, pos.y, drawingStart.price, yToPrice(pos.y), true);
  }
}

function drawCrosshair(x, y) {
  if(!drawCtx||!drawCanvas) return;
  const W=drawCanvas.width, H=drawCanvas.height;
  drawCtx.save();
  drawCtx.strokeStyle='#64748b55';
  drawCtx.lineWidth=1;
  drawCtx.setLineDash([3,3]);
  drawCtx.beginPath(); drawCtx.moveTo(x,0); drawCtx.lineTo(x,H); drawCtx.stroke();
  drawCtx.beginPath(); drawCtx.moveTo(0,y); drawCtx.lineTo(W,y); drawCtx.stroke();
  // price label on right
  const price=yToPrice(y);
  if(price) {
    const label=fmtPrice(price);
    drawCtx.fillStyle='#1a1e28';
    drawCtx.fillRect(W-60, y-9, 58, 16);
    drawCtx.strokeStyle='#2a2f3d';
    drawCtx.setLineDash([]);
    drawCtx.strokeRect(W-60, y-9, 58, 16);
    drawCtx.fillStyle='#e2e8f0';
    drawCtx.font='10px monospace';
    drawCtx.fillText(label, W-57, y+3);
  }
  drawCtx.restore();
}

// RIGHT CLICK: delete nearest drawing
function onDrawRightClick(e) {
  e.preventDefault(); e.stopPropagation();
  if(drawingStart) { drawingStart=null; redrawAll(); return; } // cancel in-progress
  if(!drawings[fsSymbol]||!drawings[fsSymbol].length) return;
  const pos=getCanvasPos(e);
  let minDist=25, minIdx=-1;
  drawings[fsSymbol].forEach((d,i)=>{
    const y1=priceToY(d.price1)||d.y1, y2=priceToY(d.price2)||d.y2;
    const dist=distToLine(d.x1, y1, d.x2, y2, pos.x, pos.y, d.type);
    if(dist<minDist){ minDist=dist; minIdx=i; }
  });
  if(minIdx>=0){ drawings[fsSymbol].splice(minIdx,1); redrawAll(); }
}

function distToLine(x1,y1,x2,y2, mx,my, type) {
  if(type==='hline') return Math.abs(my-y1); // horizontal line
  const dx=x2-x1, dy=y2-y1, len=Math.sqrt(dx*dx+dy*dy)||1;
  const t=Math.max(0,Math.min(1,((mx-x1)*dx+(my-y1)*dy)/(len*len)));
  return Math.sqrt(Math.pow(mx-(x1+t*dx),2)+Math.pow(my-(y1+t*dy),2));
}

function redrawAll() {
  if(!drawCtx||!drawCanvas) return;
  drawCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
  (drawings[fsSymbol]||[]).forEach(d=>{
    const y1=priceToY(d.price1)||d.y1;
    const y2=priceToY(d.price2)||d.y2;
    drawShape(drawCtx, d.type, d.x1, y1, d.x2, y2, d.price1, d.price2, false);
  });
}

function drawShape(ctx, type, x1, y1, x2, y2, price1, price2, isPreview) {
  ctx.save();
  const alpha = isPreview ? '99' : 'ff';
  const W=drawCanvas.width, H=drawCanvas.height;

  if(type==='hline') {
    // ── Horizontal Level ── TradingView style: full-width line + price label
    ctx.strokeStyle='#2962ff'+alpha;
    ctx.lineWidth=1.5;
    ctx.setLineDash(isPreview?[5,3]:[]);
    ctx.beginPath(); ctx.moveTo(0,y1); ctx.lineTo(W,y1); ctx.stroke();
    // dot at click
    ctx.fillStyle='#2962ff'+alpha;
    ctx.beginPath(); ctx.arc(x1,y1,4,0,Math.PI*2); ctx.fill();
    // price tag on right edge
    const lbl=fmtPrice(price1);
    ctx.fillStyle='#2962ff';
    ctx.fillRect(W-58, y1-9, 56, 17);
    ctx.fillStyle='#fff';
    ctx.font='bold 10px monospace';
    ctx.fillText(lbl, W-55, y1+3);

  } else if(type==='segment') {
    // ── Trend Line / Segment ──
    ctx.strokeStyle='#2962ff'+alpha;
    ctx.lineWidth=2;
    ctx.setLineDash(isPreview?[5,3]:[]);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.setLineDash([]);
    // endpoint dots
    [x1,x2].forEach((x,i)=>{ const y=i===0?y1:y2; ctx.fillStyle='#2962ff'+alpha; ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x,y,2,0,Math.PI*2); ctx.fill(); });

  } else if(type==='ray') {
    // ── Ray — extends to edge of chart ──
    ctx.strokeStyle='#f7931a'+alpha;
    ctx.lineWidth=2;
    ctx.setLineDash(isPreview?[5,3]:[]);
    const dx=x2-x1, dy=y2-y1, len=Math.sqrt(dx*dx+dy*dy)||1;
    // extend to canvas boundary
    let t=3000/len;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x1+dx*t, y1+dy*t); ctx.stroke();
    ctx.setLineDash([]);
    // start dot
    ctx.fillStyle='#f7931a'+alpha;
    ctx.beginPath(); ctx.arc(x1,y1,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x1,y1,2,0,Math.PI*2); ctx.fill();

  } else if(type==='channel') {
    // ── Parallel Channel ──
    ctx.strokeStyle='#9c27b0'+alpha;
    ctx.lineWidth=1.5;
    ctx.setLineDash(isPreview?[5,3]:[]);
    const dy=y2-y1;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x1,y1+dy); ctx.lineTo(x2,y2+dy); ctx.stroke();
    ctx.setLineDash([]);
    // fill
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x2,y2+dy); ctx.lineTo(x1,y1+dy); ctx.closePath();
    ctx.fillStyle='#9c27b018'; ctx.fill();
    // dots
    [[x1,y1],[x2,y2],[x1,y1+dy],[x2,y2+dy]].forEach(([x,y])=>{ ctx.fillStyle='#9c27b0'+alpha; ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill(); });

  } else if(type==='ruler') {
    // ── Measure / Ruler — TradingView style ──
    const pct=(price1&&price2&&price1!==0)?((price2-price1)/Math.abs(price1)*100):0;
    const color=pct>=0?'#22c55e':'#ef4444';
    ctx.strokeStyle=color+alpha;
    ctx.lineWidth=1;
    ctx.setLineDash([4,3]);
    // rectangle outline
    ctx.beginPath(); ctx.rect(Math.min(x1,x2), Math.min(y1,y2), Math.abs(x2-x1), Math.abs(y2-y1)); ctx.stroke();
    ctx.setLineDash([]);
    // filled rectangle
    ctx.fillStyle=color+'22'; ctx.fill();
    // label in center
    const lbl=`${pct>=0?'+':''}${pct.toFixed(2)}%`;
    const cx=Math.min(x1,x2)+Math.abs(x2-x1)/2;
    const cy=Math.min(y1,y2)+Math.abs(y2-y1)/2;
    ctx.font='bold 12px monospace';
    const tw=ctx.measureText(lbl).width;
    ctx.fillStyle='#13161eee'; ctx.fillRect(cx-tw/2-5, cy-10, tw+10, 20);
    ctx.fillStyle=color; ctx.fillText(lbl, cx-tw/2, cy+4);
    // corner dots
    [[x1,y1],[x2,y2]].forEach(([x,y])=>{ ctx.fillStyle=color+alpha; ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fill(); });
  }
  ctx.restore();
}

function clearDrawings() {
  if(!fsSymbol) return;
  drawings[fsSymbol]=[];
  drawingStart=null;
  if(drawCtx&&drawCanvas) drawCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
}

function attachRedrawListener() {
  if(!fsChart) return;
  fsChart.chart.timeScale().subscribeVisibleTimeRangeChange(()=>redrawAll());
  fsChart.chart.subscribeCrosshairMove(()=>{ if(!drawingStart) redrawAll(); });
}

function setTool(tool) {
  activeTool=tool;
  document.querySelectorAll('[id^="tool-"]').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('tool-'+tool);
  if(btn) btn.classList.add('active');
  if (drawCanvas) {
    drawCanvas.style.pointerEvents = tool==='none' ? 'none' : 'auto';
    drawCanvas.style.cursor = tool==='none' ? 'default' : 'crosshair';
  }
}

function initDrawCanvas() {
  const fsBody=document.getElementById('fs-body');
  const old=document.getElementById('draw-canvas');
  if(old) { old.removeEventListener('mousedown', onDrawMouseDown); old.removeEventListener('mousemove', onDrawMouseMove); old.removeEventListener('mouseup', onDrawMouseUp); old.removeEventListener('contextmenu', onDrawRightClick); old.remove(); }
  drawCanvas=document.createElement('canvas');
  drawCanvas.id='draw-canvas';
  drawCanvas.style.cssText='position:absolute;inset:0;width:100%;height:100%;z-index:10;pointer-events:none;';
  drawCanvas.width=fsBody.clientWidth;
  drawCanvas.height=fsBody.clientHeight;
  fsBody.style.position='relative';
  fsBody.appendChild(drawCanvas);
  drawCtx=drawCanvas.getContext('2d');
  drawCanvas.addEventListener('mousedown', onDrawMouseDown);
  drawCanvas.addEventListener('mousemove', onDrawMouseMove);
  drawCanvas.addEventListener('mouseup', onDrawMouseUp);
  drawCanvas.addEventListener('contextmenu', onDrawRightClick);
}

function getCanvasPos(e) {
  if(!drawCanvas) return {x:0,y:0};
  const rect=drawCanvas.getBoundingClientRect();
  return { x:e.clientX-rect.left, y:e.clientY-rect.top };
}

function canvasPosToPrice(y) {
  if(!fsChart) return 0;
  try {
    // Lightweight Charts v4: coordinateToPrice works relative to chart container top
    const fsBody = document.getElementById('fs-body');
    const bodyRect = fsBody.getBoundingClientRect();
    const canvasRect = drawCanvas.getBoundingClientRect();
    // offset between canvas top and fsBody top
    const offsetY = canvasRect.top - bodyRect.top;
    const chartY = y + offsetY;
    const price = fsChart.candles.coordinateToPrice(chartY);
    return price || 0;
  } catch(e){ return 0; }
}

function onDrawMouseDown(e) {
  if(activeTool==='none') return;
  if(e.button!==0) return;
  const pos=getCanvasPos(e);
  const price=canvasPosToPrice(pos.y);
  drawingStart={x:pos.x, y:pos.y, price};
  drawingInProgress=true;
  e.preventDefault();
  e.stopPropagation();
}

function onDrawMouseMove(e) {
  if(!drawingStart) return;
  const pos=getCanvasPos(e);
  redrawAll();
  if(drawingInProgress) drawPreview(drawingStart, pos);
  e.stopPropagation();
}

function onDrawMouseUp(e) {
  if(!drawingInProgress || !drawingStart) return;
  const pos=getCanvasPos(e);
  const price2=canvasPosToPrice(pos.y);
  if(!drawings[fsSymbol]) drawings[fsSymbol]=[];
  // single click (small movement) still saves for hline/ruler at click point
  const dist=Math.sqrt(Math.pow(pos.x-drawingStart.x,2)+Math.pow(pos.y-drawingStart.y,2));
  const endX = dist < 5 ? drawingStart.x+80 : pos.x;
  const endY = dist < 5 ? drawingStart.y : pos.y;
  const endPrice = dist < 5 ? drawingStart.price : price2;
  drawings[fsSymbol].push({
    type:activeTool,
    x1:drawingStart.x, y1:drawingStart.y,
    x2:endX, y2:endY,
    price1:drawingStart.price,
    price2:endPrice
  });
  drawingInProgress=false;
  drawingStart=null;
  redrawAll();
  e.stopPropagation();
}

function onDrawRightClick(e) {
  e.preventDefault();
  e.stopPropagation();
  if(!drawings[fsSymbol]||!drawings[fsSymbol].length) return;
  const pos=getCanvasPos(e);
  // find closest drawing to click
  let minDist=20, minIdx=-1;
  drawings[fsSymbol].forEach((d,i)=>{
    const dist=distToShape(d, pos.x, pos.y);
    if(dist<minDist){ minDist=dist; minIdx=i; }
  });
  if(minIdx>=0) {
    drawings[fsSymbol].splice(minIdx,1);
    redrawAll();
  }
}

function distToShape(d, mx, my) {
  // distance from point to line segment
  const dx=d.x2-d.x1, dy=d.y2-d.y1;
  const len=Math.sqrt(dx*dx+dy*dy)||1;
  const t=Math.max(0,Math.min(1,((mx-d.x1)*dx+(my-d.y1)*dy)/(len*len)));
  const px=d.x1+t*dx, py=d.y1+t*dy;
  return Math.sqrt(Math.pow(mx-px,2)+Math.pow(my-py,2));
}

function drawPreview(start, end) {
  if(!drawCtx) return;
  drawShape(drawCtx, activeTool, start.x, start.y, end.x, end.y, start.price, canvasPosToPrice(end.y), true);
}

function redrawAll() {
  if(!drawCtx || !drawCanvas) return;
  drawCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
  const symdrawings=drawings[fsSymbol]||[];
  symdrawings.forEach(d=>{
    // recalc y from price (chart might have scrolled/scaled)
    let y1=d.y1, y2=d.y2;
    try {
      y1=fsChart.chart.priceScale('right').priceToCoordinate(d.price1)||d.y1;
      if(d.price2) y2=fsChart.chart.priceScale('right').priceToCoordinate(d.price2)||d.y2;
    } catch(e){}
    drawShape(drawCtx, d.type, d.x1, y1, d.x2, y2, d.price1, d.price2, false);
  });
}

function drawShape(ctx, type, x1, y1, x2, y2, price1, price2, isPreview) {
  ctx.save();
  ctx.strokeStyle = isPreview ? '#6366f1aa' : '#6366f1';
  ctx.fillStyle = '#6366f122';
  ctx.lineWidth = isPreview ? 1.5 : 2;
  ctx.setLineDash(isPreview ? [4,3] : []);
  ctx.font = '11px monospace';
  ctx.fillStyle = '#a5b4fc';

  const W = drawCanvas.width;

  if (type==='hline') {
    // horizontal level — spans full width
    ctx.beginPath();
    ctx.moveTo(0, y1); ctx.lineTo(W, y1);
    ctx.strokeStyle = isPreview ? '#22c55eaa' : '#22c55e';
    ctx.lineWidth=1.5;
    ctx.stroke();
    ctx.fillStyle='#22c55e';
    ctx.fillText(fmtPrice(price1), W-70, y1-4);

  } else if (type==='ray') {
    // ray from start going to infinity in direction
    const dx=x2-x1, dy=y2-y1;
    const len=Math.sqrt(dx*dx+dy*dy)||1;
    const ext=3000;
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x1+dx/len*ext, y1+dy/len*ext);
    ctx.strokeStyle = isPreview ? '#f59e0baa' : '#f59e0b';
    ctx.stroke();
    // arrowhead
    const angle=Math.atan2(dy,dx);
    const ax=x1+dx/len*Math.min(ext,200), ay=y1+dy/len*Math.min(ext,200);
    ctx.beginPath();
    ctx.moveTo(ax,ay);
    ctx.lineTo(ax-10*Math.cos(angle-0.3), ay-10*Math.sin(angle-0.3));
    ctx.lineTo(ax-10*Math.cos(angle+0.3), ay-10*Math.sin(angle+0.3));
    ctx.closePath();
    ctx.fillStyle= isPreview ? '#f59e0baa' : '#f59e0b';
    ctx.fill();

  } else if (type==='segment') {
    ctx.beginPath();
    ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
    ctx.strokeStyle = isPreview ? '#3b82f6aa' : '#3b82f6';
    ctx.stroke();
    // endpoints
    ctx.fillStyle= isPreview ? '#3b82f6aa' : '#3b82f6';
    ctx.beginPath(); ctx.arc(x1,y1,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x2,y2,3,0,Math.PI*2); ctx.fill();

  } else if (type==='channel') {
    // parallel channel: line + shifted line
    const dx=x2-x1, dy=y2-y1;
    const dist=Math.abs(price1-price2);
    let shiftY=0;
    try { 
      const p0=fsChart.chart.priceScale('right').priceToCoordinate(price1)||y1;
      const p1=fsChart.chart.priceScale('right').priceToCoordinate(price1-dist)||y1;
      shiftY=p1-p0;
    } catch(e){ shiftY=40; }
    ctx.strokeStyle= isPreview ? '#a855f7aa' : '#a855f7';
    // main line
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    // parallel
    ctx.beginPath(); ctx.moveTo(x1,y1+shiftY); ctx.lineTo(x2,y2+shiftY); ctx.stroke();
    // fill between
    ctx.beginPath();
    ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
    ctx.lineTo(x2,y2+shiftY); ctx.lineTo(x1,y1+shiftY);
    ctx.closePath();
    ctx.fillStyle= isPreview ? '#a855f711' : '#a855f718';
    ctx.fill();

  } else if (type==='ruler') {
    // measure tool: show price diff and %
    ctx.strokeStyle= isPreview ? '#ef4444aa' : '#ef4444';
    // horizontal line at y1
    ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y1); ctx.stroke();
    // vertical line
    ctx.beginPath(); ctx.moveTo(x2,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.setLineDash([]);
    // bracket lines
    ctx.beginPath(); ctx.moveTo(x1-5,y1); ctx.lineTo(x1+5,y1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x2-5,y2); ctx.lineTo(x2+5,y2); ctx.stroke();
    // label
    const diff=price2-price1;
    const pct=price1>0?(diff/price1*100):0;
    const label=`${pct>=0?'+':''}${pct.toFixed(2)}%`;
    ctx.fillStyle=diff>=0?'#22c55e':'#ef4444';
    ctx.font='bold 11px monospace';
    const lx=Math.min(x1,x2)+(Math.abs(x2-x1)/2)-40;
    const ly=Math.min(y1,y2)+(Math.abs(y2-y1)/2);
    // background
    ctx.save();
    ctx.fillStyle='#13161ecc';
    ctx.fillRect(lx-4, ly-14, label.length*7+8, 18);
    ctx.restore();
    ctx.fillStyle=diff>=0?'#22c55e':'#ef4444';
    ctx.fillText(label, lx, ly);
  }
  ctx.restore();
}

function clearDrawings() {
  if (!fsSymbol) return;
  drawings[fsSymbol]=[];
  if(drawCtx && drawCanvas) drawCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
}

// redraw on chart scroll/scale
function attachRedrawListener() {
  if(!fsChart) return;
  fsChart.chart.timeScale().subscribeVisibleTimeRangeChange(()=>redrawAll());
  fsChart.chart.subscribeCrosshairMove(()=>{ if(!drawingStart) redrawAll(); });
}
