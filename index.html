<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoScreener</title>
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0f14; --bg2: #13161e; --bg3: #1a1e28;
  --border: #2a2f3d; --text: #e2e8f0; --muted: #64748b;
  --green: #22c55e; --red: #ef4444; --yellow: #f59e0b; --accent: #6366f1;
}
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'JetBrains Mono','Courier New',monospace; font-size:12px; overflow:hidden; }
.app { display:flex; height:100vh; overflow:hidden; }

/* SIDEBAR */
.sidebar { width:280px; min-width:280px; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; }
.sidebar-header { padding:10px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.sidebar-title { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
.filter-row { padding:6px 10px; border-bottom:1px solid var(--border); display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
.filter-label { font-size:10px; color:var(--muted); white-space:nowrap; }
.filter-input { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:3px 7px; border-radius:4px; font-family:inherit; font-size:11px; width:100%; }
.filter-input:focus { outline:none; border-color:var(--accent); }
.range-inputs { display:flex; gap:4px; width:100%; }
.range-input { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:3px 6px; border-radius:4px; font-family:inherit; font-size:11px; width:50%; }
.range-input:focus { outline:none; border-color:var(--accent); }
.range-input::placeholder { color:var(--muted); }
.col-header { display:grid; grid-template-columns:1fr 55px 55px 65px; padding:5px 10px; border-bottom:1px solid var(--border); color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.05em; }
.col-header span { cursor:pointer; user-select:none; }
.col-header span:hover { color:var(--text); }
.coin-list { flex:1; overflow-y:auto; }
.coin-list::-webkit-scrollbar { width:3px; }
.coin-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.coin-row { display:grid; grid-template-columns:1fr 55px 55px 65px; padding:5px 10px; border-bottom:1px solid #1a1e2833; cursor:pointer; transition:background .1s; align-items:center; }
.coin-row:hover { background:var(--bg3); }
.coin-row.selected { background:#6366f118; border-left:2px solid var(--accent); }
.coin-name { font-size:12px; font-weight:600; }
.coin-exch { font-size:9px; color:var(--muted); margin-top:1px; }
.val { text-align:right; font-size:11px; }
.up { color:var(--green); } .dn { color:var(--red); } .muted { color:var(--muted); }
.natr-badge { font-size:9px; padding:1px 4px; border-radius:3px; background:#f59e0b18; color:var(--yellow); border:1px solid #f59e0b33; }

/* MAIN */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.toolbar { background:var(--bg2); border-bottom:1px solid var(--border); padding:6px 10px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.tb-sep { width:1px; height:16px; background:var(--border); margin:0 2px; }
.tb-label { font-size:10px; color:var(--muted); white-space:nowrap; }
.btn { background:var(--bg3); border:1px solid var(--border); color:var(--muted); padding:3px 9px; border-radius:4px; cursor:pointer; font-size:11px; font-family:inherit; transition:all .15s; white-space:nowrap; }
.btn:hover { border-color:var(--accent); color:var(--text); }
.btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.btn-bi { color:#f0b90b; border-color:#f0b90b33; }
.btn-bi.active { background:#f0b90b18; border-color:#f0b90b; }
.btn-ok { color:#1a78ff; border-color:#1a78ff33; }
.btn-ok.active { background:#1a78ff18; border-color:#1a78ff; }
.btn-by { color:#f7931a; border-color:#f7931a33; }
.btn-by.active { background:#f7931a18; border-color:#f7931a; }
.tb-filter { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:3px 7px; border-radius:4px; font-family:inherit; font-size:11px; width:70px; }
.tb-filter:focus { outline:none; border-color:var(--accent); }
.tb-filter::placeholder { color:var(--muted); }

/* CHARTS */
.charts-area { flex:1; overflow:hidden; padding:6px; display:grid; gap:6px; }
.chart-card { background:var(--bg2); border:1px solid var(--border); border-radius:6px; display:flex; flex-direction:column; overflow:hidden; cursor:pointer; transition:border-color .2s; }
.chart-card:hover { border-color:#6366f166; }
.chart-header { padding:5px 8px; border-bottom:1px solid var(--border); }
.chart-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
.chart-ticker { font-size:13px; font-weight:700; }
.chart-price-row { display:flex; align-items:center; gap:6px; }
.chart-price { font-size:13px; font-weight:700; }
.chart-indicators { display:flex; gap:4px; flex-wrap:wrap; }
.ind { font-size:9px; padding:1px 5px; border-radius:3px; white-space:nowrap; }
.ind-green { background:#22c55e18; color:#22c55e; border:1px solid #22c55e33; }
.ind-red { background:#ef444418; color:#ef4444; border:1px solid #ef444433; }
.ind-yellow { background:#f59e0b18; color:#f59e0b; border:1px solid #f59e0b33; }
.ind-blue { background:#3b82f618; color:#3b82f6; border:1px solid #3b82f633; }
.ind-purple { background:#6366f118; color:#a5b4fc; border:1px solid #6366f133; }
.ind-gray { background:#64748b18; color:#94a3b8; border:1px solid #64748b33; }
.chart-body { flex:1; position:relative; min-height:0; }
.chart-body > div { width:100%!important; height:100%!important; }

/* FULLSCREEN */
.fullscreen-overlay { display:none; position:fixed; inset:0; background:#0d0f14; z-index:1000; flex-direction:column; }
.fullscreen-overlay.open { display:flex; }
.fs-header { padding:8px 14px; border-bottom:1px solid var(--border); background:var(--bg2); display:flex; align-items:center; justify-content:space-between; }
.fs-indicators { display:flex; gap:5px; flex-wrap:wrap; padding:6px 10px; border-bottom:1px solid var(--border); background:var(--bg2); }
.fs-body { flex:1; min-height:0; }
.close-btn { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:4px 12px; border-radius:4px; cursor:pointer; font-family:inherit; font-size:12px; }
.close-btn:hover { border-color:var(--red); color:var(--red); }

/* STATUS */
.status-bar { padding:3px 12px; background:var(--bg2); border-top:1px solid var(--border); font-size:10px; color:var(--muted); display:flex; gap:16px; align-items:center; }
.dot { width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; margin-right:4px; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Монеты</span>
      <span id="coin-count" style="font-size:10px;color:var(--muted)">—</span>
    </div>
    <div class="filter-row">
      <input class="filter-input" id="search" placeholder="Поиск тикера..." />
    </div>
    <div class="filter-row">
      <span class="filter-label" style="width:100%;margin-bottom:3px">Объём 24h (млн $):</span>
      <div class="range-inputs">
        <input class="range-input" id="vol-min" placeholder="от" type="number" min="0" oninput="applyFilters()"/>
        <input class="range-input" id="vol-max" placeholder="до" type="number" min="0" oninput="applyFilters()"/>
      </div>
    </div>
    <div class="filter-row">
      <span class="filter-label" style="width:100%;margin-bottom:3px">NATR (%):</span>
      <div class="range-inputs">
        <input class="range-input" id="natr-min" placeholder="от" type="number" step="0.1" oninput="applyFilters()"/>
        <input class="range-input" id="natr-max" placeholder="до" type="number" step="0.1" oninput="applyFilters()"/>
      </div>
    </div>
    <div class="filter-row">
      <span class="filter-label" style="width:100%;margin-bottom:3px">Изменение цены (%):</span>
      <div class="range-inputs">
        <input class="range-input" id="chg-min" placeholder="от" type="number" step="0.1" oninput="applyFilters()"/>
        <input class="range-input" id="chg-max" placeholder="до" type="number" step="0.1" oninput="applyFilters()"/>
      </div>
    </div>
    <div class="col-header">
      <span onclick="setSort('symbol')">Тикер <span id="sort-symbol"></span></span>
      <span onclick="setSort('change')" style="text-align:right">ИЗМ <span id="sort-change"></span></span>
      <span onclick="setSort('natr')" style="text-align:right">NATR <span id="sort-natr"></span></span>
      <span onclick="setSort('volume')" style="text-align:right">ОБЪ <span id="sort-volume">▼</span></span>
    </div>
    <div class="coin-list" id="coin-list"></div>
  </div>

  <div class="main">
    <div class="toolbar">
      <span class="tb-label">БИРЖА:</span>
      <button class="btn btn-bi active" id="ex-BI" onclick="toggleExchange('BI')">BI-F</button>
      <button class="btn btn-ok" id="ex-OK" onclick="toggleExchange('OK')">OK-F</button>
      <button class="btn btn-by" id="ex-BY" onclick="toggleExchange('BY')">BY-F</button>
      <div class="tb-sep"></div>
      <span class="tb-label">ТФ:</span>
      <button class="btn active" id="tf-1m" onclick="setTf('1m')">1м</button>
      <button class="btn" id="tf-5m" onclick="setTf('5m')">5м</button>
      <button class="btn" id="tf-15m" onclick="setTf('15m')">15м</button>
      <button class="btn" id="tf-1h" onclick="setTf('1h')">1ч</button>
      <button class="btn" id="tf-4h" onclick="setTf('4h')">4ч</button>
      <button class="btn" id="tf-1d" onclick="setTf('1d')">1д</button>
      <button class="btn" id="tf-1w" onclick="setTf('1w')">1н</button>
      <div class="tb-sep"></div>
      <span class="tb-label">СЕТКА:</span>
      <button class="btn" id="grid-1" onclick="setGrid(1,1)">1×1</button>
      <button class="btn" id="grid-2" onclick="setGrid(2,2)">2×2</button>
      <button class="btn active" id="grid-3" onclick="setGrid(3,3)">3×3</button>
      <div class="tb-sep"></div>
      <span class="tb-label">ОБЪ≥</span>
      <input class="tb-filter" id="tb-vol" placeholder="млн" type="number" min="0" oninput="applyFilters()" />
      <span class="tb-label">NATR≥</span>
      <input class="tb-filter" id="tb-natr" placeholder="%" type="number" step="0.1" min="0" oninput="applyFilters()" />
      <span class="tb-label">ИЗМ≥</span>
      <input class="tb-filter" id="tb-chg" placeholder="%" type="number" step="0.1" oninput="applyFilters()" />
    </div>
    <div class="charts-area" id="charts-area"></div>
    <div class="status-bar">
      <span><span class="dot"></span>Live</span>
      <span id="status-text">Загрузка...</span>
      <span id="last-update" style="margin-left:auto">—</span>
    </div>
  </div>
</div>

<!-- FULLSCREEN -->
<div class="fullscreen-overlay" id="fs-overlay">
  <div class="fs-header">
    <div style="display:flex;align-items:center;gap:12px">
      <span id="fs-ticker" style="font-size:16px;font-weight:700"></span>
      <span id="fs-price" style="font-size:15px;font-weight:700"></span>
      <span id="fs-change" style="font-size:13px"></span>
      <span style="font-size:10px;color:var(--muted)" id="fs-meta"></span>
    </div>
    <button class="close-btn" onclick="closeFullscreen()">✕ Закрыть</button>
  </div>
  <div class="fs-indicators" id="fs-indicators"></div>
  <div class="fs-body" id="fs-body"></div>
</div>

<script>
const BINANCE = 'https://fapi.binance.com';
let allCoins=[], filteredCoins=[], selectedCoins=[];
let currentTf='1m', gridCols=3, gridRows=3;
let sortKey='volume', sortDir=-1, searchQ='';
let chartInstances={};
let fsChart=null, fsSymbol=null;

// ── DATA ──────────────────────────────────────────────────────────────
async function fetchTickers() {
  const r = await fetch(`${BINANCE}/fapi/v1/ticker/24hr`);
  const data = await r.json();
  return data.filter(d=>d.symbol.endsWith('USDT')).map(d=>{
    const price=+d.lastPrice, high=+d.highPrice, low=+d.lowPrice;
    const natr = price>0 ? (high-low)/price*100 : 0;
    return {
      symbol: d.symbol.replace('USDT',''),
      price, change:+d.priceChangePercent,
      volume: +d.quoteVolume/1e6,
      natr: +natr.toFixed(2),
      trades: +d.count,
      high, low,
      exchange:'BI-F'
    };
  });
}

async function fetchKlines(symbol, interval, limit=120) {
  const r = await fetch(`${BINANCE}/fapi/v1/klines?symbol=${symbol}USDT&interval=${interval}&limit=${limit}`);
  const data = await r.json();
  return data.map(k=>({ time: k[0]/1000, open:+k[1], high:+k[2], low:+k[3], close:+k[4], volume:+k[5] }));
}

async function loadTickers() {
  document.getElementById('status-text').textContent='Загрузка тикеров...';
  try {
    allCoins = await fetchTickers();
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString('ru');
    document.getElementById('status-text').textContent = `${allCoins.length} монет · Binance Futures`;
    applyFilters();
  } catch(e) {
    document.getElementById('status-text').textContent='Ошибка загрузки';
  }
}

// ── FILTERS & SORT ────────────────────────────────────────────────────
function getNum(id) { const v=parseFloat(document.getElementById(id)?.value); return isNaN(v)?null:v; }

function applyFilters() {
  let coins = [...allCoins];
  if (searchQ) coins=coins.filter(c=>c.symbol.includes(searchQ.toUpperCase()));

  const volMin = getNum('vol-min') ?? getNum('tb-vol');
  const volMax = getNum('vol-max');
  const natrMin = getNum('natr-min') ?? getNum('tb-natr');
  const natrMax = getNum('natr-max');
  const chgMin = getNum('chg-min') ?? getNum('tb-chg');
  const chgMax = getNum('chg-max');

  if (volMin!=null) coins=coins.filter(c=>c.volume>=volMin);
  if (volMax!=null) coins=coins.filter(c=>c.volume<=volMax);
  if (natrMin!=null) coins=coins.filter(c=>c.natr>=natrMin);
  if (natrMax!=null) coins=coins.filter(c=>c.natr<=natrMax);
  if (chgMin!=null) coins=coins.filter(c=>c.change>=chgMin);
  if (chgMax!=null) coins=coins.filter(c=>c.change<=chgMax);

  coins.sort((a,b)=>{
    const av=a[sortKey], bv=b[sortKey];
    if (typeof av==='string') return sortDir*av.localeCompare(bv);
    return sortDir*(bv-av);
  });
  filteredCoins=coins;
  document.getElementById('coin-count').textContent=coins.length;
  renderList();
  const maxSlots=gridCols*gridRows;
  if (selectedCoins.length===0 && coins.length>0)
    selectedCoins=coins.slice(0,maxSlots).map(c=>c.symbol);
  renderCharts();
}

function setSort(key) {
  if (sortKey===key) sortDir*=-1; else { sortKey=key; sortDir=key==='symbol'?1:-1; }
  ['symbol','change','natr','volume'].forEach(k=>{
    const el=document.getElementById('sort-'+k);
    if(el) el.textContent = k===sortKey?(sortDir>0?'▲':'▼'):'';
  });
  applyFilters();
}

// ── LIST ──────────────────────────────────────────────────────────────
function renderList() {
  const el=document.getElementById('coin-list');
  el.innerHTML=filteredCoins.slice(0,300).map(c=>{
    const sel=selectedCoins.includes(c.symbol)?'selected':'';
    const cls=c.change>=0?'up':'dn';
    const vol=c.volume>=1000?(c.volume/1000).toFixed(1)+'B':c.volume.toFixed(0)+'M';
    return `<div class="coin-row ${sel}" onclick="selectCoin('${c.symbol}')">
      <div><div class="coin-name">${c.symbol}</div><div class="coin-exch">${c.exchange}</div></div>
      <div class="val ${cls}">${c.change>=0?'+':''}${c.change.toFixed(1)}%</div>
      <div class="val"><span class="natr-badge">${c.natr.toFixed(1)}</span></div>
      <div class="val muted">${vol}</div>
    </div>`;
  }).join('');
}

function selectCoin(symbol) {
  const idx=selectedCoins.indexOf(symbol);
  const maxSlots=gridCols*gridRows;
  if (idx>=0) selectedCoins.splice(idx,1);
  else { if(selectedCoins.length>=maxSlots) selectedCoins.shift(); selectedCoins.push(symbol); }
  renderList();
  renderCharts();
}

// ── INDICATORS HTML ───────────────────────────────────────────────────
function buildIndicators(coin, compact=true) {
  if (!coin) return '';
  const cls=coin.change>=0?'ind-green':'ind-red';
  const vol=coin.volume>=1000?(coin.volume/1000).toFixed(1)+'B':coin.volume.toFixed(0)+'M';
  const range=coin.price>0?((coin.high-coin.low)/coin.price*100).toFixed(2):0;
  const trades=coin.trades>=1000?(coin.trades/1000).toFixed(0)+'K':coin.trades;
  const items=[
    `<span class="ind ${cls}">${coin.change>=0?'+':''}${coin.change.toFixed(2)}%</span>`,
    `<span class="ind ind-yellow">Ренж ${range}%</span>`,
    `<span class="ind ind-yellow">NATR ${coin.natr.toFixed(2)}%</span>`,
    `<span class="ind ind-blue">Сделок ${trades}</span>`,
    `<span class="ind ind-gray">Объём ${vol}</span>`,
  ];
  if (!compact) items.push(`<span class="ind ind-purple">High ${fmtPrice(coin.high)}</span>`,`<span class="ind ind-purple">Low ${fmtPrice(coin.low)}</span>`);
  return items.join('');
}

function fmtPrice(p) {
  return p<0.0001?p.toFixed(8):p<0.01?p.toFixed(6):p<1?p.toFixed(4):p<100?p.toFixed(3):p.toFixed(2);
}

// ── LIGHTWEIGHT CHART SETUP ───────────────────────────────────────────
function makeChartOptions(w,h) {
  return {
    width: w, height: h,
    layout: { background:{color:'#13161e'}, textColor:'#64748b' },
    grid: { vertLines:{color:'#1a1e28'}, horzLines:{color:'#1a1e28'} },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor:'#2a2f3d', scaleMargins:{top:0.05,bottom:0.2} },
    timeScale: { borderColor:'#2a2f3d', timeVisible:true, secondsVisible:false },
    handleScroll: true,
    handleScale: true,
  };
}

function addCandleSeries(chart) {
  return chart.addCandlestickSeries({
    upColor:'#22c55e', downColor:'#ef4444',
    borderUpColor:'#22c55e', borderDownColor:'#ef4444',
    wickUpColor:'#22c55e', wickDownColor:'#ef4444',
  });
}

function addVolumeSeries(chart) {
  return chart.addHistogramSeries({
    priceFormat:{type:'volume'},
    priceScaleId:'vol',
    color:'#3b82f633',
  });
}

// ── CHARTS GRID ───────────────────────────────────────────────────────
async function renderCharts() {
  const area=document.getElementById('charts-area');
  // destroy old charts
  Object.values(chartInstances).forEach(inst=>{ try{ inst.chart.remove(); }catch(e){} });
  chartInstances={};

  area.style.gridTemplateColumns=`repeat(${gridCols},1fr)`;
  area.style.gridTemplateRows=`repeat(${gridRows},1fr)`;

  const maxSlots=gridCols*gridRows;
  let symbols=selectedCoins.slice(0,maxSlots);
  if (symbols.length===0 && filteredCoins.length>0) {
    selectedCoins=filteredCoins.slice(0,maxSlots).map(c=>c.symbol);
    symbols=[...selectedCoins];
  }

  area.innerHTML=symbols.map(sym=>{
    const coin=allCoins.find(c=>c.symbol===sym);
    const price=coin?.price||0, change=coin?.change||0;
    const cls=change>=0?'up':'dn';
    return `<div class="chart-card" id="card-${sym}">
      <div class="chart-header">
        <div class="chart-top">
          <span class="chart-ticker">${sym} <span style="font-size:9px;color:var(--muted);font-weight:400">BI-F · ${currentTf}</span></span>
          <div class="chart-price-row">
            <span class="chart-price ${cls}">$${fmtPrice(price)}</span>
            <span class="${cls}" style="font-size:11px">${change>=0?'+':''}${change.toFixed(2)}%</span>
          </div>
        </div>
        <div class="chart-indicators" id="inds-${sym}">${buildIndicators(coin,true)}</div>
      </div>
      <div class="chart-body" id="body-${sym}"></div>
    </div>`;
  }).join('');

  for (const sym of symbols) {
    const bodyEl=document.getElementById('body-'+sym);
    const cardEl=document.getElementById('card-'+sym);
    if (!bodyEl) continue;

    const W=bodyEl.clientWidth||300, H=bodyEl.clientHeight||120;
    const chart=LightweightCharts.createChart(bodyEl, makeChartOptions(W,H));
    const candleSeries=addCandleSeries(chart);
    const volSeries=addVolumeSeries(chart);
    chart.priceScale('vol').applyOptions({ scaleMargins:{top:0.85,bottom:0} });

    chartInstances[sym]={chart, candleSeries, volSeries};

    // click = fullscreen
    cardEl.addEventListener('click', ()=>openFullscreen(sym));

    // load data async
    fetchKlines(sym, currentTf).then(klines=>{
      if (!klines.length) return;
      candleSeries.setData(klines);
      volSeries.setData(klines.map(k=>({ time:k.time, value:k.volume, color: k.close>=k.open?'#22c55e33':'#ef444433' })));
      chart.timeScale().fitContent();
    });
  }
}

// ── FULLSCREEN ────────────────────────────────────────────────────────
async function openFullscreen(symbol) {
  fsSymbol=symbol;
  const coin=allCoins.find(c=>c.symbol===symbol);
  const overlay=document.getElementById('fs-overlay');
  overlay.classList.add('open');

  document.getElementById('fs-ticker').textContent=symbol;
  if (coin) {
    const cls=coin.change>=0?'up':'dn';
    document.getElementById('fs-price').className='chart-price '+cls;
    document.getElementById('fs-price').textContent='$'+fmtPrice(coin.price);
    document.getElementById('fs-change').className=cls;
    document.getElementById('fs-change').textContent=(coin.change>=0?'+':'')+coin.change.toFixed(2)+'%';
    document.getElementById('fs-meta').textContent=`BI-F · ${currentTf}`;
    document.getElementById('fs-indicators').innerHTML=buildIndicators(coin,false);
  }

  const fsBody=document.getElementById('fs-body');
  fsBody.innerHTML='';
  if (fsChart) { try{ fsChart.remove(); }catch(e){} fsChart=null; }

  const W=fsBody.clientWidth||window.innerWidth, H=fsBody.clientHeight||(window.innerHeight-120);
  fsChart=LightweightCharts.createChart(fsBody, makeChartOptions(W,H));
  const candleSeries=addCandleSeries(fsChart);
  const volSeries=addVolumeSeries(fsChart);
  fsChart.priceScale('vol').applyOptions({ scaleMargins:{top:0.85,bottom:0} });

  const klines=await fetchKlines(symbol, currentTf, 300);
  if (klines.length) {
    candleSeries.setData(klines);
    volSeries.setData(klines.map(k=>({ time:k.time, value:k.volume, color:k.close>=k.open?'#22c55e33':'#ef444433' })));
    fsChart.timeScale().fitContent();
  }
}

function closeFullscreen() {
  document.getElementById('fs-overlay').classList.remove('open');
  if (fsChart) { try{ fsChart.remove(); }catch(e){} fsChart=null; }
}

document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeFullscreen(); });

// ── TF / GRID / EXCHANGE ──────────────────────────────────────────────
function setTf(tf) {
  currentTf=tf;
  document.querySelectorAll('[id^="tf-"]').forEach(b=>b.classList.remove('active'));
  document.getElementById('tf-'+tf).classList.add('active');
  renderCharts();
  if (fsSymbol && document.getElementById('fs-overlay').classList.contains('open')) {
    document.getElementById('fs-meta').textContent=`BI-F · ${currentTf}`;
    openFullscreen(fsSymbol);
  }
}

function setGrid(cols,rows) {
  gridCols=cols; gridRows=rows;
  ['1','2','3'].forEach(x=>document.getElementById('grid-'+x).classList.remove('active'));
  document.getElementById('grid-'+cols).classList.add('active');
  selectedCoins=filteredCoins.slice(0,cols*rows).map(c=>c.symbol);
  renderCharts();
}

function toggleExchange(ex) {
  const btn=document.getElementById('ex-'+ex);
  btn.classList.toggle('active');
}

// ── RESIZE ────────────────────────────────────────────────────────────
let resizeTimer;
window.addEventListener('resize', ()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{
    Object.entries(chartInstances).forEach(([sym,inst])=>{
      const body=document.getElementById('body-'+sym);
      if (body) inst.chart.applyOptions({width:body.clientWidth, height:body.clientHeight});
    });
    if (fsChart) {
      const fsBody=document.getElementById('fs-body');
      fsChart.applyOptions({width:fsBody.clientWidth, height:fsBody.clientHeight});
    }
  },100);
});

// ── SEARCH ────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e=>{ searchQ=e.target.value; applyFilters(); });

// ── INIT ──────────────────────────────────────────────────────────────
setGrid(3,3);
loadTickers();
setInterval(loadTickers, 30000);
</script>
</body>
</html>
